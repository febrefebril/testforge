# =============================================================================
# TestForge — Configuracao do Publisher Git
# =============================================================================
#
# QUEM EDITA ESTE ARQUIVO: responsavel tecnico / infra do time (uma unica vez).
# TESTADORES: nao precisam editar este arquivo. Passam --suite e --test-case
# na linha de comando ao gravar.
#
# Caminho gerado automaticamente no repositorio:
#   {path_prefix}/{system}/{suite}/{test_case}/{recording_id}/
#
# Exemplo:
#   recordings/siopi/credito/CT-001-criar-motorista/REC-20260624-153000/
#     ├── recording_metadata.json
#     ├── dom_snapshots/
#     ├── screenshots/
#     ├── test_ct_001_criar_motorista.py
#     └── submission_report.json
#
# =============================================================================
# SECAO 1: defaults — valores pre-preenchidos para os testadores
# =============================================================================
#
# Se todos os testadores do projeto trabalham no mesmo sistema, preencha
# `system` aqui. Assim eles nao precisam passar --system em cada gravacao.
#
# Linha de comando minima para o testador (com defaults.system preenchido):
#   testforge record "https://sistema/" --suite cadastro --test-case CT-001
#
# Se o time trabalha em multiplos sistemas, deixe system vazio e
# os testadores passam --system manualmente.
#
defaults:
  # Sistema/aplicacao principal do projeto (ex: SIOPI, FROTAS, CRM).
  # Quando preenchido, dispensa o uso de --system em cada gravacao.
  # Deixe vazio ("") se o time grava para multiplos sistemas.
  system: ""

# =============================================================================
# SECAO 2: publisher — configuracao Git (infra preenche uma vez)
# =============================================================================

publisher:
  # Habilita/desabilita publicacao automatica apos cada gravacao.
  enabled: true

  # URL do repositorio Git para publicacao.
  # Vazio = MODO LOCAL: commita diretamente no repo local do projeto (sem clone).
  # Util para times que compartilham o mesmo repo do codigo fonte.
  #
  # Com URL = MODO REMOTO: clona, copia artefatos e faz push.
  # Util para separar recordings do codigo de producao.
  url: ""

  # Token de acesso (OPCIONAL).
  # Nao preencher se o ambiente usa autenticacao nativa:
  #   - Linux/Mac: SSH keys ou gh auth login (GitHub), az devops login (Azure)
  #   - Windows: Git Credential Manager (GCM) autentica automaticamente
  # token: ""

  # Branch alvo para os commits de gravacao.
  branch: main

  # Prefixo do caminho no repositorio.
  path_prefix: recordings

  # Nome do remote Git (usado apenas no modo local).
  remote: origin

# =============================================================================
# REFERENCIA: variaveis de ambiente (alternativa ao config.yml)
# =============================================================================
# Se este arquivo nao existir, o TestForge le as env vars abaixo.
# Util para CI/CD ou ambientes efemeros sem acesso ao filesystem do projeto.
#
#   TESTFORGE_GIT_URL          URL do repositorio (obrigatorio se sem config.yml)
#   TESTFORGE_GIT_TOKEN        Token de acesso (opcional se GCM configurado)
#   TESTFORGE_GIT_BRANCH       Branch alvo (default: main)
#   TESTFORGE_GIT_PATH_PREFIX  Prefixo no repositorio (default: recordings)
