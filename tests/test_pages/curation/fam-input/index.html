<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><title>FAM-06: Input</title></head>
<body>
<h1>FAM-06: Input / Interaction (INP-007)</h1>
<label for="cpf">CPF:</label>
<input id="cpf" type="text" placeholder="000.000.000-00" data-masked="cpf">
<button id="submit" onclick="var v=document.getElementById('cpf').value;document.getElementById('result').textContent='CPF preenchido: '+v">Enviar</button>
<div id="result" role="status" style="margin-top:10px"></div>
<script>
// Simulate JS mask that blocks direct fill
var cpfInput = document.getElementById('cpf');
cpfInput.addEventListener('input', function(e){
  var v = e.target.value.replace(/\D/g,'');
  if(v.length>3) v = v.slice(0,3)+'.'+v.slice(3);
  if(v.length>7) v = v.slice(0,7)+'.'+v.slice(7);
  if(v.length>11) v = v.slice(0,11)+'-'+v.slice(11);
  e.target.value = v;
});
</script>
</body></html>
