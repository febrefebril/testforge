<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Currency Mask</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
  label { display: block; margin-top: 16px; font-weight: bold; }
  input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; text-align: right; font-size: 1.2em; }
  .prefix { position: absolute; margin-left: 8px; margin-top: 14px; font-weight: bold; color: #666; }
  .field-wrap { position: relative; }
  button { margin-top: 20px; padding: 10px 24px; background: #006600; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  .note { color: #666; font-size: 0.85em; margin-top: 4px; }
</style>
</head>
<body>
  <h1>Currency Mask</h1>
  <p>Simula campo com mascara de moeda que formata valor programaticamente.</p>
  <form id="maskForm">
    <label for="valor">Valor (R$)</label>
    <div class="field-wrap">
      <span class="prefix">R$</span>
      <input type="text" id="valor" name="valor" placeholder="0,00" style="padding-left: 36px;">
    </div>
    <p class="note">Mascara de moeda: digite numeros, o valor e formatado automaticamente.</p>

    <label for="descricao">Descricao</label>
    <input type="text" id="descricao" name="descricao" placeholder="Descricao (campo normal)">
    <p class="note">Campo normal sem mascara.</p>

    <button type="submit" id="enviar">Enviar</button>
  </form>

  <div id="output" style="margin-top: 20px;"></div>

  <script>
    // Simple currency mask: formats input as Brazilian currency
    document.getElementById('valor').addEventListener('input', function(e) {
      var raw = this.value.replace(/\D/g, '');
      if (raw.length === 0) { this.value = ''; return; }
      var num = parseInt(raw) / 100;
      var formatted = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      this.value = formatted;
    });

    document.getElementById('maskForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var v = document.getElementById('valor').value;
      var d = document.getElementById('descricao').value;
      document.getElementById('output').innerHTML =
        '<p><strong>Recebido:</strong> Valor=R$' + v + ', Descricao=' + d + '</p>';
    });
  </script>
</body>
</html>
