<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Select Not Captured</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
  label { display: block; margin-top: 16px; font-weight: bold; }
  select, input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
  button { margin-top: 20px; padding: 10px 24px; background: #006600; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
  <h1>Select Not Captured</h1>
  <p>Select nativo onde valor pode não ser capturado se change event não disparar</p>
  <form id="selectForm">
    <label for="produto">Produto</label>
    <select id="produto" name="produto">
      <option value="">Selecione um produto...</option>
      <option value="notebook">Notebook</option>
      <option value="tablet">Tablet</option>
      <option value="smartphone">Smartphone</option>
      <option value="monitor">Monitor</option>
    </select>

    <label for="quantidade">Quantidade</label>
    <input type="number" id="quantidade" name="quantidade" placeholder="1" value="1">

    <label for="categoria">Categoria</label>
    <select id="categoria" name="categoria">
      <option value="">Selecione...</option>
      <option value="eletronicos">Eletrônicos</option>
      <option value="escritorio">Escritório</option>
      <option value="games">Games</option>
    </select>

    <button type="submit">Calcular</button>
  </form>

  <div id="output" style="margin-top: 20px;"></div>

  <script>
    document.getElementById('selectForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const produto = document.getElementById('produto').value;
      const quantidade = document.getElementById('quantidade').value;
      const categoria = document.getElementById('categoria').value;
      document.getElementById('output').innerHTML =
        '<p><strong>Resumo:</strong> ' + quantidade + 'x ' + produto + ' (' + categoria + ')</p>';
    });
  </script>
</body>
</html>
