<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LAB-16: React MUI Select simulation</title>
  <style>
    body { font-family: Roboto, Arial, sans-serif; padding: 24px; background: #fafafa; }
    h2 { margin-bottom: 16px; color: #1976d2; }

    /* MUI FormControl / Select simulation */
    .MuiFormControl-root { display: inline-block; min-width: 220px; margin-bottom: 20px; }
    .MuiInputLabel-root { display: block; font-size: 12px; color: rgba(0,0,0,0.6); margin-bottom: 4px; }

    .MuiSelect-root {
      position: relative;
      display: flex;
      align-items: center;
      border: 1px solid rgba(0,0,0,0.23);
      border-radius: 4px;
      background: #fff;
      padding: 8.5px 32px 8.5px 14px;
      cursor: pointer;
      font-size: 16px;
      min-height: 40px;
      user-select: none;
    }
    .MuiSelect-root:focus-within { border-color: #1976d2; border-width: 2px; }
    .MuiSelect-icon {
      position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: rgba(0,0,0,0.54); font-size: 18px;
    }
    .MuiSelect-select { flex: 1; color: #333; }
    .MuiSelect-nativeInput { display: none; }

    /* MUI Popper / Paper overlay (not CDK) */
    .MuiMenu-root {
      display: none;
      position: absolute;
      z-index: 1300;
    }
    .MuiMenu-root[data-popper-placement] { display: block; }
    .MuiPaper-root {
      background: #fff;
      border-radius: 4px;
      box-shadow: 0px 5px 5px -3px rgba(0,0,0,0.2),
                  0px 8px 10px 1px rgba(0,0,0,0.14),
                  0px 3px 14px 2px rgba(0,0,0,0.12);
      min-width: 220px;
      max-height: 300px;
      overflow-y: auto;
    }
    .MuiList-root { padding: 8px 0; list-style: none; margin: 0; }
    .MuiMenuItem-root {
      padding: 6px 16px;
      font-size: 16px;
      cursor: pointer;
      color: #333;
      min-height: 36px;
      display: flex;
      align-items: center;
    }
    .MuiMenuItem-root:hover { background: rgba(0,0,0,0.04); }
    .MuiMenuItem-root.Mui-selected { background: rgba(25,118,210,0.08); }
    .MuiMenuItem-root.Mui-selected:hover { background: rgba(25,118,210,0.12); }
    .MuiMenuItem-root.Mui-disabled { color: rgba(0,0,0,0.38); cursor: default; pointer-events: none; }

    .result { margin-top: 16px; font-size: 13px; color: #555; }
    #selected-value { font-weight: bold; color: #1976d2; }
    label.field-label { display: block; margin-bottom: 6px; font-size: 13px; color: #444; }
  </style>
</head>
<body>
  <h2>LAB-16: React MUI Select</h2>

  <label class="field-label" id="tipo-conta-label">Tipo de conta</label>

  <div class="MuiFormControl-root" id="form-control-tipo-conta">
    <div class="MuiInputBase-root MuiOutlinedInput-root MuiInputBase-colorPrimary">
      <div
        id="mui-select-tipo-conta"
        class="MuiSelect-root MuiSelect-outlined"
        role="combobox"
        aria-haspopup="listbox"
        aria-expanded="false"
        aria-labelledby="tipo-conta-label"
        aria-controls="mui-menu-tipo-conta"
        tabindex="0">
        <span class="MuiSelect-select" data-value="">Selecione</span>
        <span class="MuiSelect-icon" aria-hidden="true">&#9660;</span>
        <input class="MuiSelect-nativeInput" aria-hidden="true" tabindex="-1" value="">
      </div>
    </div>
  </div>

  <!-- MUI Menu / Popper overlay (uses data-popper-placement, not CDK) -->
  <div
    id="mui-menu-tipo-conta"
    class="MuiMenu-root MuiModal-root"
    role="presentation">
    <div class="MuiPaper-root MuiMenu-paper MuiPaper-elevation8 MuiPaper-rounded">
      <ul
        class="MuiList-root MuiMenu-list"
        role="listbox"
        aria-labelledby="tipo-conta-label"
        tabindex="-1">
        <li class="MuiMenuItem-root Mui-disabled" role="option" data-value="" aria-disabled="true">Selecione</li>
        <li class="MuiMenuItem-root" role="option" data-value="corrente">Conta Corrente</li>
        <li class="MuiMenuItem-root" role="option" data-value="poupanca">Conta Poupança</li>
        <li class="MuiMenuItem-root" role="option" data-value="salario">Conta Salário</li>
        <li class="MuiMenuItem-root Mui-disabled" role="option" data-value="conjunta" aria-disabled="true">Conta Conjunta (indisponível)</li>
        <li class="MuiMenuItem-root" role="option" data-value="investimento">Conta Investimento</li>
      </ul>
    </div>
  </div>

  <div class="result">
    Selecionado: <span id="selected-value">—</span>
  </div>

  <script>
    (function () {
      const trigger = document.getElementById('mui-select-tipo-conta');
      const menu = document.getElementById('mui-menu-tipo-conta');
      const selectSpan = trigger.querySelector('.MuiSelect-select');
      const nativeInput = trigger.querySelector('.MuiSelect-nativeInput');
      const display = document.getElementById('selected-value');

      function openMenu() {
        // MUI sets data-popper-placement to open the Popper overlay
        menu.setAttribute('data-popper-placement', 'bottom');
        trigger.setAttribute('aria-expanded', 'true');
        // Position below trigger
        const rect = trigger.getBoundingClientRect();
        menu.style.position = 'fixed';
        menu.style.top = (rect.bottom + 4) + 'px';
        menu.style.left = rect.left + 'px';
      }

      function closeMenu() {
        menu.removeAttribute('data-popper-placement');
        trigger.setAttribute('aria-expanded', 'false');
      }

      function selectItem(item) {
        if (item.classList.contains('Mui-disabled')) return;
        const value = item.getAttribute('data-value');
        const text = item.textContent.trim();
        selectSpan.textContent = text;
        selectSpan.setAttribute('data-value', value);
        nativeInput.value = value;
        display.textContent = text + ' (' + value + ')';
        menu.querySelectorAll('.MuiMenuItem-root').forEach(i => i.classList.remove('Mui-selected'));
        item.classList.add('Mui-selected');
        closeMenu();
      }

      trigger.addEventListener('click', function (e) {
        if (menu.hasAttribute('data-popper-placement')) {
          closeMenu();
        } else {
          openMenu();
        }
      });

      menu.querySelectorAll('.MuiMenuItem-root').forEach(function (item) {
        item.addEventListener('click', function (e) {
          e.stopPropagation();
          selectItem(item);
        });
      });

      document.addEventListener('click', function (e) {
        if (!trigger.contains(e.target) && !menu.contains(e.target)) {
          closeMenu();
        }
      });

      trigger.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeMenu();
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          menu.hasAttribute('data-popper-placement') ? closeMenu() : openMenu();
        }
      });
    })();
  </script>
</body>
</html>
