<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Contenteditable</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
  label { display: block; margin-top: 16px; font-weight: bold; }
  input, .editor { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
  .editor { min-height: 100px; border: 2px solid #ccc; border-radius: 4px; padding: 12px; outline: none; }
  .editor:focus { border-color: #6366f1; }
  button { margin-top: 20px; padding: 10px 24px; background: #6366f1; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  .note { color: #666; font-size: 0.85em; margin-top: 4px; }
</style>
</head>
<body>
  <h1>Contenteditable</h1>
  <p>Editor rich-text usando contenteditable.</p>
  <form id="editForm">
    <label for="titulo">Titulo</label>
    <input type="text" id="titulo" name="titulo" placeholder="Titulo do documento">

    <label>Conteudo (editor rich-text)</label>
    <div id="conteudo" class="editor" contenteditable="true" role="textbox" aria-label="Conteudo do documento">
      <p>Edite este texto...</p>
    </div>
    <p class="note">Este campo usa contenteditable. Mudancas sao detectadas por MutationObserver.</p>

    <label for="tags">Tags</label>
    <input type="text" id="tags" name="tags" placeholder="tags, separadas, por, virgula">

    <button type="submit" id="enviar">Salvar</button>
  </form>

  <div id="output" style="margin-top: 20px;"></div>

  <script>
    document.getElementById('editForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var t = document.getElementById('titulo').value;
      var c = document.getElementById('conteudo').innerHTML;
      var tags = document.getElementById('tags').value;
      document.getElementById('output').innerHTML =
        '<p><strong>Recebido:</strong> Titulo=' + t + ', Tags=' + tags + '</p>' +
        '<p><strong>Conteudo HTML:</strong> ' + c.substring(0, 200) + '</p>';
    });
  </script>
</body>
</html>
