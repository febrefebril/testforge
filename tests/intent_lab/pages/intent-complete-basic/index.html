<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Intent Complete Basic</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
  label { display: block; margin-top: 16px; font-weight: bold; }
  input, select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
  button { margin-top: 20px; padding: 10px 24px; background: #0066cc; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  button:hover { background: #0052a3; }
  #result { margin-top: 20px; padding: 12px; background: #e8f4e8; border-radius: 4px; display: none; }
</style>
</head>
<body>
  <h1>Intent Complete — Fluxo Feliz</h1>
  <form id="mainForm">
    <label for="nome">Nome completo</label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" placeholder="email@exemplo.com">

    <label for="cidade">Cidade</label>
    <input type="text" id="cidade" name="cidade" placeholder="Sua cidade">

    <label for="estado">Estado</label>
    <select id="estado" name="estado">
      <option value="">Selecione...</option>
      <option value="SP">São Paulo</option>
      <option value="RJ">Rio de Janeiro</option>
      <option value="MG">Minas Gerais</option>
      <option value="BA">Bahia</option>
    </select>

    <label>
      <input type="checkbox" name="aceito" value="sim">
      Aceito os termos
    </label>

    <button type="submit">Enviar</button>
  </form>

  <div id="result">
    <p><strong>Dados enviados com sucesso!</strong></p>
    <p id="resultData"></p>
  </div>

  <script>
    document.getElementById('mainForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        cidade: document.getElementById('cidade').value,
        estado: document.getElementById('estado').value,
        aceito: document.querySelector('[name="aceito"]').checked,
      };
      document.getElementById('resultData').textContent = JSON.stringify(data, null, 2);
      document.getElementById('result').style.display = 'block';
    });
  </script>
</body>
</html>
