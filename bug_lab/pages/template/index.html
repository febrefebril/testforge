<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bug Lab Template</title>
</head>
<body>
  <h1>Bug Lab — Counter</h1>
  <p id="counter-display">Count: 0</p>
  <button id="increment-btn" onclick="increment()">Increment</button>
  <button id="reset-btn" onclick="reset()">Reset</button>

  <script>
    let count = 0;
    function increment() {
      count += 1;
      document.getElementById("counter-display").textContent = "Count: " + count;
    }
    function reset() {
      count = 0;
      document.getElementById("counter-display").textContent = "Count: 0";
    }
  </script>
</body>
</html>
