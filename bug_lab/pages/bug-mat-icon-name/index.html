<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>BUG: Mat-Icon Accessible Name Contamination</title>
  <style>
    /* Simulate Angular Material styling */
    .mat-button {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border: none; border-radius: 4px;
      background: #3f51b5; color: white; cursor: pointer;
      font-family: Roboto, sans-serif; font-size: 14px;
    }
    .mat-icon {
      font-family: 'Material Icons'; font-size: 18px;
      width: 18px; height: 18px;
    }
    #result { margin-top: 16px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Bug Lab — Mat-Icon Accessible Name Contamination</h1>
  <p>Button with mat-icon: <code>file_upload</code> icon + "Carregar" label.</p>
  <p>Expected accessible name: <strong>"Carregar"</strong> (icon text removed).</p>
  <p>Actual accessible name (before fix): <strong>"file_upload Carregar"</strong> (icon ligature leaks).</p>

  <!-- Simulates: <button mat-raised-button><mat-icon>file_upload</mat-icon> Carregar</button> -->
  <button id="upload-btn" class="mat-button" onclick="handleClick()">
    <span class="mat-icon" aria-hidden="true">file_upload</span>
    Carregar
  </button>

  <div id="result" role="status"></div>

  <script>
    function handleClick() {
      document.getElementById("result").textContent = "Carregado com sucesso!";
    }
  </script>
</body>
</html>
