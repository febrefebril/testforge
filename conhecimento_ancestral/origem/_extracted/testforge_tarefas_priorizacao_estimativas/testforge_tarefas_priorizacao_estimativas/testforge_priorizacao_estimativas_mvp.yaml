version: "0.1.0"
artifact: "TestForge MVP Prioritization and Estimation"
status: "draft"

priority_formula:
  valor_aprendizado: 0.30
  reducao_risco: 0.25
  dependencia: 0.20
  observabilidade: 0.15
  esforco_inverso: 0.10

mvp1_epics:
  - id: "EP-00"
    title: "Fundação do Produto e Governança"
    priority: 1
    rationale: "Base de versionamento, governança e decisões normativas."
  - id: "EP-01"
    title: "Synthetic Lab Mínimo"
    priority: 2
    rationale: "Permite validar hipóteses sem depender de ambiente real."
  - id: "EP-02"
    title: "EvidenceCollector e EvidenceStore"
    priority: 3
    rationale: "Sem evidência e banco, não há auditoria nem aprendizado."
  - id: "EP-07"
    title: "Oracle Pós-Ação mínimo"
    priority: 4
    rationale: "Sem oracle, não há como medir falso healing."
  - id: "EP-08"
    title: "Promotion Gate mínimo"
    priority: 5
    rationale: "Impede promoção sem evidência e critérios objetivos."

