Mutações implementadas
change_id
Altera o id do botão.

Resultado esperado:




Plain Text
taxonomia: LOCATOR_NOT_FOUND ou GENERATED_ID_CHANGED
recuperável: sim
estratégia esperada: usar role, text, testid ou contexto
change_accessible_name
Troca o texto/acessible name de:




Plain Text
Pesquisar
para:




Plain Text
Consultar
Resultado esperado:




Plain Text
taxonomia: LOCATOR_NOT_FOUND
recuperável: sim, se data-testid ou contexto permanecerem
risco: médio
duplicate_button_text
Cria dois botões com o mesmo texto:




Plain Text
Pesquisar
Pesquisar
Resultado esperado:




Plain Text
taxonomia: LOCATOR_AMBIGUOUS
recuperável: sim
estratégia esperada: refinamento contextual
remove_testid_and_change_text
Remove data-testid e altera o texto.

Resultado esperado:




Plain Text
taxonomia: LOCATOR_NOT_FOUND
recuperável: não ou somente com revisão humana
estratégia esperada: quarentena
overlay_blocks_click
Adiciona overlay bloqueando clique.

Resultado esperado:




Plain Text
taxonomia: ACTIONABILITY_OBSCURED
recuperável por locator healing: não
estratégia esperada: política de overlay/wait, não trocar locator
Esse caso é fundamental para garantir que o TestForge não tente curar locator quando o problema é actionability.

