1. Como criar o EvidenceCollector com Playwright?
O EvidenceCollector deve ser um componente isolado. Ele não decide healing, não promove locator e não chama LLM. Ele apenas coleta e organiza evidências.

Ele coleta:




Plain Text
screenshot_before.png
screenshot_after.png
dom_before.html
dom_after.html
ax_tree_before.json
ax_tree_after.json
network_log.json
score_breakdown.json
oracle_results.json
promotion_decision.json
trace.zip
manifest.json
O Playwright já possui recursos úteis para isso, como screenshots, tracing, auto-waiting, actionability checks e web-first assertions; o TestForge deve reaproveitar esses recursos em vez de criar waits e logs improvisados.
