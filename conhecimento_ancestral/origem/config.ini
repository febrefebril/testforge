5. Ponto importante sobre shadow mode
No mundo real, o shadow mode pode operar em dois níveis:

Modo 1 — Suggest only



Plain Text
gera candidato
valida o máximo possível
não executa ação curada
registra evidência
manda para revisão
Mais seguro.

Modo 2 — Synthetic validation



Plain Text
gera candidato
executa ação curada em fake app ou ambiente controlado
roda oracle
registra evidência
Foi o modo usado no demo, porque estamos em um sistema falso e controlado.

Para sistemas CAIXA reais, eu começaria com suggest only e só depois usaria execução curada em ambiente seguro.

