2. Como criar uma query para listar casos pendentes?
Incluí no pacote o arquivo:




Plain Text
pending_reviews.sql
A query principal é:




SQL
SELECT
    hs.id AS healing_suggestion_id,
    datetime(hs.created_at, 'unixepoch') AS created_at,
    hs.application,
    hs.page_signature,
    hs.action_id,
    hs.technology_family,
    hs.taxonomy_code,
    hs.original_locator,
    hs.suggested_locator,
    hs.total_score,
    hs.status,
    ep.screenshot_before,
    ep.screenshot_after,
    ep.manifest_json
FROM healing_suggestion hs
LEFT JOIN evidence_package ep ON ep.healing_suggestion_id = hs.id
LEFT JOIN review_decision rd ON rd.healing_suggestion_id = hs.id
WHERE hs.mode = 'shadow'
  AND hs.status IN ('suggested', 'pending_review')
  AND rd.id IS NULL
ORDER BY hs.created_at DESC
LIMIT 100;

