Uso básico



Python
collector = EvidenceCollector(page, root_dir="evidence", enable_trace=True)

metadata = EvidenceMetadata(
    run_id="run-synthetic-001",
    action_id="step-search-client",
    application="fake-react-bank-app",
    page_signature="fake-react-bank-app/search-client",
    taxonomy_code="LOCATOR_NOT_FOUND",
    technology_profile="react",
    original_locator="page.get_by_role('button', name='Pesquisar')",
    suggested_locator="page.get_by_test_id('btn-search-client')",
    mode="shadow",
)

await collector.start_step(metadata)

# Executa tentativa original, healing shadow, oracle etc.

manifest = await collector.finish_step(
    score_breakdown={
        "semantic_score": 0.82,
        "uniqueness_score": 0.91,
        "actionability_score": 1.0,
        "historical_score": 0.0,
        "total_score": 0.88,
    },
    oracle_results=[
        {
            "type": "visual_dom",
            "expected": "Tabela Resultado da consulta visível",
            "actual": "visible",
            "result": "passed",
        }
    ],
    promotion_decision={
        "state": "experimental",
        "allowed": False,
        "reason": "Requer revisão humana e histórico.",
    },
)

