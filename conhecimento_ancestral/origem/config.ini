1. Como implementar o Promotion Gate na prática?
O Promotion Gate deve ser um componente separado, não uma regra espalhada no runner.

Ele não deve:




Plain Text
gerar locator
executar teste
chamar LLM
alterar script
Ele deve apenas decidir:




Plain Text
esta sugestão de healing pode evoluir de estado?
Estados recomendados:




Plain Text
experimental
  ↓
shadow_validated
  ↓
canary
  ↓
trusted
E também:




Plain Text
rejected
deprecated
1.1 Entradas do Promotion Gate
Ele recebe um contexto consolidado:




YAML
promotion_context:
  current_state: experimental

  metrics:
    reviewed_observations: 42
    oracle_precision: 0.97
    false_acceptance_rate: 0.01
    false_heal_rate: 0.00
    llm_escalation_rate: 0.04
    semantic_gap: 0.32
    uniqueness_score: 0.91
    actionability_score: 1.00

  evidence:
    screenshot_before: true
    screenshot_after: true
    dom_before: true
    dom_after: true
    accessibility_tree_before: true
    accessibility_tree_after: true
    score_breakdown: true
    taxonomy_code: true
    technology_profile: true
    post_action_oracle: true

  blockers:
    oracle_conflict: false
    false_heal_reviewed: false
    taxonomy_wrong_unresolved: false
    technology_profile_wrong_unresolved: false

