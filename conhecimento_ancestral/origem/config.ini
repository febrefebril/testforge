1.2 Regras globais de bloqueio
Antes de promover, o gate verifica bloqueios absolutos:




Plain Text
evidence package incompleto
oracle ausente
conflito entre oracles
falso healing revisado
taxonomia errada não resolvida
perfil tecnológico errado não resolvido
semantic gap baixo
uniqueness baixo
actionability baixo
ação crítica sem oracle de negócio ou rede
Se qualquer um desses existir, não promove.

1.3 Regras por estado
experimental → shadow_validated
Exigir:




Plain Text
mínimo 30 observações revisadas
oracle_precision >= 95%
false_acceptance_rate < 2%
false_heal_rate < 2%
Synthetic Lab passou
evidence package completo
shadow_validated → canary
Exigir:




Plain Text
amostra revisada por humano
nenhum falso healing crítico
plano de rollback
auto-heal restrito a poucos fluxos
canary → trusted
Exigir:




Plain Text
mínimo 100 observações revisadas
nenhum falso healing nos últimos 30 casos
overhead de execução <= 20%
LLM acionada em menos de 10%
O arquivo Skeleton Python — Promotion Gate já traz essa estrutura com PromotionContext, PromotionMetrics, EvidenceCompleteness e PromotionGate.

2. Como criar mutações sintéticas controladas?
O objetivo das mutações sintéticas é testar o TestForge sem esperar que todos os casos apareçam nos ambientes reais.

Você cria uma aplicação fake, por exemplo:




Plain Text
fake-react-bank-app
fake-angular-form-app
fake-jsf-like-legacy-app
fake-iframe-app
fake-shadow-dom-app
E cada aplicação aceita uma mutação controlada:




Plain Text
/fake-react-bank-app?mutation=duplicate_button_text
/fake-angular-form-app?mutation=material_overlay_obscured
2.1 Formas de implementar mutações
Opção A — Feature flag na aplicação fake
A própria aplicação renderiza diferente conforme a mutação.

Exemplo conceitual:




JavaScript
const mutation = new URLSearchParams(window.location.search).get("mutation");

if (mutation === "duplicate_button_text") {
  renderTwoSearchButtons();
} else {
  renderOneSearchButton();
}
Essa é a opção mais limpa para o Synthetic Lab.

Opção B — Mutator no servidor
O backend fake renderiza HTML/JS diferente conforme o parâmetro.

Útil para simular aplicações server-side ou JSF-like.

Opção C — Injeção controlada no browser
O runner injeta alteração no DOM antes da execução:




Python
await page.evaluate("""
  document.querySelector('#btnPesquisar').id = 'btnPesquisarNovo';
""")
Essa opção é útil para criar mutações rápidas sem alterar a aplicação fake.

2.2 Matriz de mutações mínimas
Eu começaria com esta matriz:




YAML
synthetic_mutation_matrix:
  locator:
    - code: change_id
      expected_taxonomy: LOCATOR_NOT_FOUND
      expected_recoverable: true

    - code: duplicate_button_text
      expected_taxonomy: LOCATOR_AMBIGUOUS
      expected_recoverable: true

    - code: remove_testid_and_change_text
      expected_taxonomy: LOCATOR_NOT_FOUND
      expected_recoverable: false

  actionability:
    - code: overlay_blocks_click
      expected_taxonomy: ACTIONABILITY_OBSCURED
      expected_recoverable: false

    - code: disabled_button
      expected_taxonomy: ACTIONABILITY_DISABLED
      expected_recoverable: false

  react:
    - code: css_in_js_class_changed
      expected_taxonomy: REACT_CSS_IN_JS_CLASS_CHANGED
      expected_recoverable: true

    - code: portal_modal_context_changed
      expected_taxonomy: REACT_PORTAL_CONTEXT_CHANGED
      expected_recoverable: true

  angular:
    - code: material_overlay_obscured
      expected_taxonomy: ANGULAR_MATERIAL_OVERLAY_OBSCURED
      expected_recoverable: false

    - code: async_validator_pending
      expected_taxonomy: ANGULAR_ASYNC_VALIDATOR_PENDING
      expected_recoverable: false

