version: "1.0"
kind: "TestForgeHealingGovernance"

taxonomy:
  core:
    locator_resolution:
      - LOCATOR_NOT_FOUND
      - LOCATOR_AMBIGUOUS
      - LOCATOR_WRONG_CONTEXT
      - LOCATOR_STALE_OR_DETACHED
    actionability:
      - ACTIONABILITY_NOT_VISIBLE
      - ACTIONABILITY_DISABLED
      - ACTIONABILITY_OBSCURED
      - ACTIONABILITY_NOT_EDITABLE
      - ACTIONABILITY_UNSTABLE
    synchronization:
      - PAGE_NOT_READY
      - ASYNC_RENDER_PENDING
      - NETWORK_IDLE_TIMEOUT
      - SPINNER_TIMEOUT
      - DEBOUNCE_PENDING
    oracle:
      - ORACLE_MISSING
      - ORACLE_WEAK
      - ORACLE_CONFLICT
      - ORACLE_FAILED
    environment:
      - NETWORK_FAILURE
      - BACKEND_FAILURE
      - AUTHORIZATION_FAILURE
      - SESSION_EXPIRED
      - TEST_DATA_FAILURE
    context:
      - FRAME_CONTEXT_FAILURE
      - SHADOW_DOM_CONTEXT_FAILURE
      - POPUP_OR_TAB_CONTEXT_FAILURE

  technology_extensions:
    react:
      failure_codes:
        - REACT_GENERATED_ID_CHANGED
        - REACT_CSS_IN_JS_CLASS_CHANGED
        - REACT_COMPONENT_RERENDERED
        - REACT_HYDRATION_DELAY
        - REACT_PORTAL_CONTEXT_CHANGED
        - REACT_VIRTUALIZED_LIST_ITEM_NOT_MOUNTED
      locator_policy:
        prefer: [role, accessible_name, label, test_id, stable_text_with_context]
        penalize: [generated_id, css_in_js_class, nth_child, absolute_xpath]
      score_adjustments:
        test_id: 0.15
        role: 0.10
        accessible_name: 0.10
        generated_id: -0.40
        css_class_generated: -0.30
        absolute_xpath: -0.50

    angular:
      failure_codes:
        - ANGULAR_NG_GENERATED_ATTRIBUTE_CHANGED
        - ANGULAR_CHANGE_DETECTION_PENDING
        - ANGULAR_MATERIAL_OVERLAY_OBSCURED
        - ANGULAR_ASYNC_VALIDATOR_PENDING
        - ANGULAR_ROUTER_NAVIGATION_PENDING
        - ANGULAR_CDK_VIRTUAL_SCROLL_NOT_RENDERED
      locator_policy:
        prefer: [role, label, test_id, form_control_name, aria_label]
        penalize: [_ngcontent, ng_reflect, material_internal_class, absolute_xpath]
      score_adjustments:
        test_id: 0.15
        role: 0.10
        form_control_name: 0.08
        ng_reflect: -0.30
        _ngcontent: -0.30
        material_internal_class: -0.20
        absolute_xpath: -0.50

oracle_metrics:
  minimum_reviewed_observations: 30
  precision_min: 0.95
  false_acceptance_rate_max: 0.02
  require_business_or_network_for_critical_actions: true
  confusion_matrix_labels:
    - TP
    - FP
    - TN
    - FN

shadow_mode:
  evidence_required: true
  review_labels:
    - TRUE_POSITIVE_HEAL
    - FALSE_HEAL
    - NOT_RECOVERABLE
    - ORACLE_WEAK
    - TAXONOMY_WRONG
    - TECHNOLOGY_PROFILE_WRONG
    - INCONCLUSIVE
  promotion_states:
    - experimental
    - shadow_validated
    - canary
    - trusted
    - deprecated

synthetic_lab:
  fake_apps:
    - fake-react-bank-app
    - fake-angular-form-app
    - fake-jsf-like-legacy-app
    - fake-iframe-app
    - fake-shadow-dom-app
    - fake-design-system-app
  mutation_families:
    locator:
      - change_id
      - change_css_class
      - remove_data_testid
      - duplicate_button_text
      - change_accessible_name
    actionability:
      - add_overlay
      - disable_button
      - delayed_enable
      - animation_before_click
    synchronization:
      - delayed_render
      - debounce_search
      - delayed_network_response
      - spinner_timeout
    react:
      - rerender_component
      - portal_modal
      - virtualized_row_unmounted
    angular:
      - material_overlay
      - async_validator_pending
      - router_navigation_delay

database_entities:
  - locator_observation
  - healing_suggestion
  - oracle_observation
  - review_decision
  - technology_detection
  - mutation_result
  - promotion_decision
