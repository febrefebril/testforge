<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FAM-09: Recorder e Overlay</title>
<script src="../common.js"></script>
<script src="error.js"></script>
</head>
<body>
  <h1>FAM-09: Recorder e Overlay</h1>
  <button id="btn-acao" data-testid="btn-acao">Executar Ação</button>
  <div id="overlay-container"></div>
  <p id="result"></p>
  <script>
    document.getElementById("btn-acao").addEventListener("click", function() {
      document.getElementById("result").textContent = "Ação executada!";
    });
  </script>
</body>
</html>
