<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
  body { font: 13px sans-serif; padding: 16px; background: #1a1a2e; color: #e0e0e0; min-width: 300px; }
  h2 { color: #e94560; font-size: 15px; }
  label { display: block; margin: 8px 0; }
  input[type="text"], select { width: 100%; padding: 6px; border: 1px solid #0f3460;
    border-radius: 4px; background: #16213e; color: #e0e0e0; }
  input[type="checkbox"] { margin-right: 6px; }
  .hint { font-size: 11px; color: #6c757d; margin: 2px 0 8px; }
  button { padding: 8px 16px; background: #0f3460; color: #fff; border: none;
    border-radius: 6px; cursor: pointer; }
</style></head>
<body>
<h2>⛓ TestForge — Configurações</h2>
<label>Bridge WebSocket port:
  <input type="text" id="bridgePort" value="9199">
</label>
<label>Browser:
  <select id="browser"><option>firefox</option><option>chromium</option></select>
</label>
<label><input type="checkbox" id="autoRecord"> Auto-record ao navegar</label>
<label><input type="checkbox" id="captureShadowDOM"> Capture Shadow DOM</label>
<button id="saveBtn">Salvar</button>
<div id="saved" style="color:#4ecca3;display:none;margin-top:8px">✓ Salvo</div>
<script src="settings.js"></script>
</body>
</html>
