name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pytest pytest-playwright

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - name: Start test page server
        run: |
          cd testes/pagina-de-teste && python3 -m http.server 8000 &
          sleep 1
          curl -s -o /dev/null -w "%{http_code}\n" http://localhost:8000/index.html

      - name: Run element test suite
        run: |
          cd testes/pagina-de-teste && uv run pytest tests/ -v -x --tb=long 2>&1

      - name: Run automated recording test
        run: |
          uv run python testes/gravacao-automatizada/gravacao_automatizada.py 2>&1
        env:
          CI: "true"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            testes/gravacao-automatizada/teste_gerado.py
            testes/gravacao-automatizada/teste_gerado.data.json
            **/artifacts/
          if-no-files-found: ignore
