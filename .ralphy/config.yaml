# Ralphy Config — TestForge v0.3.1
# Sway + OpenCode + GSD + Caveman
project:
  name: "testforge-v1"
  language: "Python"
  framework: "Playwright + GSD"

commands:
  test: "source activate.sh && python -m pytest tests/ --ignore=tests/test_pages --ignore=tests/test_healing_e2e.py -q"
  lint: "ruff check src/"

rules:
  - "Use GSD pipeline per bug: verify→fix→test"
  - "Commit after every fix: fix: BUG-XXX — description"
  - "Run pytest after every change"
  - "Caveman mode: keep responses terse"
  - "Never commit API keys"
  - "Python source: src/testforge/"

boundaries:
  never_touch:
    - ".venv/**"
    - "node_modules/**"
    - "conhecimento_ancestral/**"
