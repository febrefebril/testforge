O padrão que aparece nas soluções maduras
1. O teste deve nascer de um contrato semântico, não de um seletor
O Playwright recomenda localizar elementos como o usuário percebe a aplicação: getByRole, getByLabel, getByPlaceholder, getByText, getByTestId, além de usar auto-waiting e assertions com retry automático para reduzir flakiness. Isso aponta para uma regra importante: o elemento não deve ser identificado primeiro por CSS/XPath; ele deve ser identificado por papel, nome acessível, label, texto ou contrato de teste.
playwright
+2

A pesquisa mais recente também reforça essa direção: há proposta de self-healing “zero-cost” usando extração da árvore de acessibilidade e hierarquia de locators, evitando LLM por execução e reextraindo apenas seletores quebrados. O ponto mais importante não é o resultado específico do artigo, mas a arquitetura: descoberta determinística + árvore de acessibilidade + healing pontual, em vez de jogar tudo para uma LLM.
arxiv

2. Self-healing bom usa múltiplos sinais, não apenas fallback de XPath
Selenium IDE, embora simples, já usa uma ideia correta: grava múltiplos locators para cada elemento e tenta outros quando o principal falha. Isso é uma forma básica de resiliência determinística.
selenium

Ferramentas como Testim e mabl levam essa ideia adiante: elas criam locators inteligentes com múltiplos atributos, contexto visual/estrutural, pontuação de confiança e auto-healing/adaptação quando a aplicação muda. A ideia comum é: não existe um locator; existe uma identidade composta do elemento.
testim
+3

3. Healenium mostra uma arquitetura útil: proxy, base histórica e relatório
O Healenium é importante como referência arquitetural porque não tenta resolver tudo no script. Ele atua como proxy/intermediário entre cliente e Selenium, intercepta falhas de localização, consulta histórico, compara DOM e persiste healing/report em backend com banco. Isso é muito próximo do que o TestForge deveria ter como camada própria: um runtime de healing observável, persistente e auditável.
