1. Como transformar histórias em tarefas?
Uma história deve ser quebrada em tarefas quando ela ainda mistura:
Plain Textanálisecontrato/schemaimplementaçãotestepersistênciaevidênciadocumentaçãointegraçãovalidaçãoMostrar mais linhas
A decomposição padrão que eu usaria é:
Plain TextUS-XX.YY — Nome da históriaTarefas:  T-XX.YY.01 — Refinar contrato/schema/configuração  T-XX.YY.02 — Implementar componente principal  T-XX.YY.03 — Implementar persistência/log/evidência  T-XX.YY.04 — Criar teste unitário  T-XX.YY.05 — Criar teste sintético/integrado  T-XX.YY.06 — Atualizar documentação  T-XX.YY.07 — Revisar critérios de aceiteMostrar mais linhas
Nem toda história precisa de todas as tarefas, mas toda história deve ter pelo menos:
Plain Textimplementaçãoteste/validaçãocritério de aceiteevidência quando aplicávelMostrar mais linhas

