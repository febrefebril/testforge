Isso permite criar prompts mais curtos, com exemplos bons e ruins, sem transformar o prompt em “motor principal”. A LLM continua sendo curadora, não executora.

8. Como validar tudo sem depender do ambiente real?
Eu faria três níveis de validação.

Nível 1 — Synthetic Lab
