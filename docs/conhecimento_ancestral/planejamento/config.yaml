7. Onde entra o healing determinístico?
O fallback trabalha com os candidatos já conhecidos.

O healing determinístico entra quando:




Plain Text
todos os candidatos conhecidos falharam
Aí o TestForge deve:




Plain Text
1. Reextrair DOM atual.
2. Reextrair accessibility tree.
3. Gerar novos candidatos.
4. Comparar com o SemanticTarget original.
5. Calcular score de similaridade.
6. Se score >= 0.90, aplicar auto-heal.
7. Se score entre 0.75 e 0.90, colocar em quarentena.
8. Se score < 0.75, enviar para LLM/curadoria.
Essa arquitetura se aproxima do padrão usado por ferramentas de self-healing como Healenium, que interceptam falhas de localização, analisam mudanças no DOM e substituem locators quebrados por alternativas com melhor correspondência, mantendo histórico e relatórios.
