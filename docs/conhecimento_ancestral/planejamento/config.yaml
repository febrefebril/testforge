Guia — Shadow Mode, falso healing, assertions e taxonomia
Schema YAML — observação de healing em shadow mode


1. Como implementar o shadow mode na prática?
O shadow mode é um modo em que o TestForge calcula a cura, mas não aplica automaticamente como fonte de verdade.
Quando um locator falha, o sistema faz isto:
Plain Text1. O runner detecta a falha real.2. Classifica a falha pela taxonomia.3. Se for falha elegível para healing, gera candidatos.4. Calcula score, uniqueness, actionability e histórico.5. Escolhe o melhor candidato.6. Simula/valida o candidato.7. Registra: “eu teria curado com este locator”.8. O teste continua falhando ou segue o comportamento original configurado.9. Um oracle automático ou humano revisa a sugestão.Mostrar mais linhas
A diferença para o auto-healing é esta:
Plain TextAuto-healing:  falhou → cura → executa → altera resultadoShadow mode:  falhou → sugere cura → mede → não promove automaticamenteMostrar mais linhas
Isso evita que o TestForge comece a “passar teste errado”.

2. Estados do shadow mode
Eu criaria uma máquina de estados assim:
Plain TextNO_HEAL_NEEDEDHEAL_CANDIDATE_GENERATEDHEAL_SUGGESTED_NOT_APPLIEDHEAL_VALIDATED_BY_ORACLEHEAL_REJECTED_BY_ORACLEHEAL_REQUIRES_HUMAN_REVIEWHEAL_FALSE_POSITIVEHEAL_PROMOTED_TO_AUTOMostrar mais linhas
Exemplo:
YAMLshadow_healing:  mode: suggest_only  original_failure: LOCATOR_NOT_FOUND  suggested_candidate:    strategy: contextual_role    value: "within form[Consulta de Propostas] button[name='Consultar']"    score: 0.87    uniqueness_score: 0.91    actionability_score: 1.0  decision:    applied: false    reason: "Shadow mode ativo"Mostrar mais linhas

3. Como medir falso healing em testes reais?
Primeiro, precisamos definir claramente.
Definição
Falso healing é quando o TestForge escolhe um novo elemento que permite o teste continuar, mas esse elemento não representa a intenção original.
Exemplo:
Plain TextIntenção original:  clicar em "Pesquisar proposta"Healing sugerido:  clicar em "Pesquisar cliente"Resultado:  alguma tabela apareceuConclusão:  o teste aparentemente passou, mas validou o fluxo errado.Mostrar mais linhas
Isso é pior do que falhar.

Métrica principal
Plain Textfalse_heal_rate =  false_heals / total_heal_suggestions_reviewedMostrar mais linhas
Exemplo:
Plain Text100 sugestões revisadas3 eram curas erradasfalse_heal_rate = 3%Mostrar mais linhas
Para mim, no TestForge, o limite inicial deveria ser rígido:
Plain Textfalse_heal_rate < 2%Mostrar mais linhas
Se passar disso, não libera auto-heal.

Outras métricas
Plain Textprecision =  true_positive_heals / all_heal_suggestions_reviewedrecall =  recovered_locator_failures / all_recoverable_locator_failuresquarantine_rate =  quarantined_heals / heal_suggestionsllm_escalation_rate =  llm_escalations / locator_failuresauto_promotion_rate =  promoted_heals / reviewed_healsMostrar mais linhas
Critérios iniciais:
Plain Textprecision >= 95%false_heal_rate < 2%llm_escalation_rate < 10%quarantine_rate aceitável, mesmo que alta no inícioMostrar mais linhas
No começo, é melhor ter muita quarentena do que falso healing.

4. Como medir isso sem depender só de revisão humana?
Você mede em camadas.
Camada 1 — Oracle automático fraco
Valida se a ação teve efeito técnico esperado:
Plain TextURL mudou?Request esperado aconteceu?Elemento esperado apareceu?Campo recebeu valor?Mensagem apareceu?Tabela carregou?Mostrar mais linhas
Exemplo:
Pythonawait candidate_locator.click()await expect(    page.get_by_role("table", name="Resultado da consulta")).to_be_visible()Mostrar mais linhas
Isso detecta muito erro, mas não todos.

Camada 2 — Oracle de negócio
Valida se o resultado pertence à intenção original.
Exemplo:
Plain TextPesquisar proposta para CPF 123  → tabela apareceu  → contém CPF 123?  → contém proposta esperada?  → request foi para endpoint de proposta?Mostrar mais linhas
Esse é mais forte.
Exemplo conceitual:
YAMLpost_action_oracle:  - type: network_response    expected: "/api/propostas/consulta status 200"  - type: visible_state    expected: "tabela Resultado da consulta visível"  - type: business_state    expected: "resultado relacionado ao CPF informado"Mostrar mais linhas
A cura só deve ser promovida se pelo menos um oracle forte passar.

Camada 3 — Revisão humana amostral
Nem todo caso precisa de revisão humana para sempre, mas no início sim.
Eu faria:
Plain TextPrimeiras 100 sugestões:  100% revisão humanaDepois:  revisão humana obrigatória para score < 0.95  revisão humana obrigatória para semantic_gap baixo  revisão humana obrigatória para tecnologia desconhecida  revisão humana amostral para casos de alto scoreMostrar mais linhas

5. Como validar a assertividade pós-ação?
Aqui precisamos separar três coisas:
Plain TextActionability:  consigo interagir com o elemento?Post-action assertion:  a tela mudou como esperado?Business oracle:  a intenção de negócio foi cumprida?Mostrar mais linhas
O erro anterior provavelmente foi tratar “consegui clicar” como sucesso.
Níveis de assertion pós-ação
Nível 1 — Técnico/visual
Plain Textelemento ficou visívelmodal abriumensagem apareceucampo foi preenchidobotão desapareceuMostrar mais linhas
Exemplo:
Pythonawait expect(page.get_by_text("Consulta realizada com sucesso")).to_be_visible()Mostrar mais linhas

Nível 2 — Navegação/estado
Plain TextURL mudourota mudouaba abriuwizard avançouestado visual mudouMostrar mais linhas
Exemplo:
Pythonawait expect(page).to_have_url(re.compile(".*/resultado"))Mostrar mais linhas

Nível 3 — Rede
Plain Textendpoint correto foi chamadostatus esperado retornoupayload contém parâmetro esperadoMostrar mais linhas
Exemplo conceitual:
Pythonasync with page.expect_response(    lambda r: "/api/propostas/consulta" in r.url and r.status == 200):    await locator.click()Mostrar mais linhas

Nível 4 — Negócio
Plain Textresultado retornado corresponde à massa usadaproposta exibida é a esperadaCPF exibido é o CPF pesquisadosituação corresponde ao dado esperadoMostrar mais linhas
Esse é o melhor nível para evitar falso healing.

Regra de promoção
Uma cura só pode ser promovida se passar por este funil:
Plain Textlocator encontrado  ↓único no contexto  ↓actionable  ↓ação executada  ↓assertion técnica passou  ↓oracle de negócio passou ou foi revisado  ↓histórico suficiente  ↓promovidoMostrar mais linhas

6. Onde entra a taxonomia das falhas?
A taxonomia entra antes do healing.
Ela decide se o TestForge deve:
Plain Textcurar locatoresperar estadotrocar contextoinvestigar massainvestigar ambientefalhar como bug realacionar LLMMostrar mais linhas
Sem taxonomia, tudo vira “problema de locator”, e isso é perigoso.

Exemplo de roteamento
Plain TextLOCATOR_NOT_FOUND  → gerar candidatos e tentar fallback/healingLOCATOR_AMBIGUOUS  → aplicar refinamento contextualACTIONABILITY_OBSCURED  → verificar overlay, spinner, modal, toast, loadingACTIONABILITY_DISABLED  → verificar estado da tela, permissão ou massa de dadosASSERTION_FAILED  → não curar locator automaticamente  → possível bug, dado inválido ou oracle erradoNETWORK_FAILURE  → classificar como backend, timeout, autenticação ou ambienteAUTHORIZATION_FAILURE  → problema de perfil/permissãoTEST_DATA_FAILURE  → problema de massaFRAME_CONTEXT_FAILURE  → resolver iframe/frame corretoSHADOW_DOM_FAILURE  → estratégia específica de shadow rootTECHNOLOGY_SPECIFIC_FAILURE  → aplicar plugin tecnológicoMostrar mais linhas

7. Onde entram as famílias de erros?
As famílias de erro viram política de decisão.
Exemplo:
YAMLfailure_family_policy:  locator_resolution:    allow_fallback: true    allow_deterministic_healing: true    allow_llm_curation: true  actionability:    allow_fallback: false    allow_wait_policy: true    allow_overlay_detection: true  assertion:    allow_fallback: false    allow_healing: false    require_bug_or_oracle_review: true  network:    allow_healing: false    require_environment_diagnosis: true  data:    allow_healing: false    require_test_data_refresh: trueMostrar mais linhas
Esse ponto é crítico: nem toda falha deve ativar self-healing.

8. Onde entram as diferenças de tecnologias?
As tecnologias entram em dois lugares:
Plain Text1. geração/ranking de candidatos2. classificação de falhas e estratégias de recuperaçãoMostrar mais linhas
Exemplo de perfis tecnológicos
Web tradicional/server-side
YAMLtechnology_profile:  family: server_side_web  locator_weights:    name: high    id: medium    role: high    text: mediumMostrar mais linhas
IDs e names podem ser mais estáveis.

React/Angular/Vue
YAMLtechnology_profile:  family: modern_spa  locator_weights:    role: high    test_id: high    text: medium    css_class: very_low    generated_id: very_lowMostrar mais linhas
Classes geradas e IDs dinâmicos devem ser muito penalizados.

JSF/PrimeFaces
YAMLtechnology_profile:  family: jsf_primefaces  locator_weights:    id_suffix: medium    label: high    role: medium    generated_full_id: lowMostrar mais linhas
Em JSF/PrimeFaces, IDs podem ter prefixos compostos por formulário/container. Às vezes o sufixo é útil, mas o ID completo pode ser frágil.

Shadow DOM
YAMLtechnology_profile:  family: shadow_dom  required_strategy:    - resolve_shadow_root    - locator_inside_component_boundaryMostrar mais linhas

Iframe
YAMLtechnology_profile:  family: iframe_based  required_strategy:    - identify_frame    - frame_locatorMostrar mais linhas

