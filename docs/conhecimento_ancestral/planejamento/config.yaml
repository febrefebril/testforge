10. A peça mais importante: Promotion Gate
Eu criaria um componente chamado PromotionGate.

Ele decide se uma cura pode virar confiável.




YAML
promotion_gate:
  min_reviewed_observations: 30
  min_oracle_precision: 0.95
  max_false_acceptance_rate: 0.02
  require_evidence_package: true
  require_business_or_network_oracle_for_critical_actions: true
  forbid_promotion_if:
    - taxonomy_wrong
    - technology_profile_wrong
    - oracle_conflict
    - semantic_gap_low
Sem Promotion Gate, o TestForge volta ao problema anterior: uma parte do sistema começa a “achar” que resolveu e passa a aplicar cura sem governança.

11. O que muda em relação ao plano que falhou?
Antes, vocês tentavam melhorar o componente que estava quebrando:




Plain Text
gravador
runner
prompt
Agora, o sistema melhora por evidência:




Plain Text
