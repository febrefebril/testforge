12. Como ficaria o fluxo final?
Plain TextTeste executa  ↓Falhou  ↓Classificar pela taxonomia  ↓É falha elegível para healing?  ↓Não → classificar como dado, ambiente, bug, assertion etc.  ↓Sim  ↓Gerar candidatos  ↓Calcular score + uniqueness + actionability + histórico  ↓Shadow mode sugere cura  ↓Validar com oracle pós-ação  ↓Registrar evidências  ↓Revisão humana ou automática  ↓Se aprovado N vezes, promover  ↓Se ambíguo, quarentena  ↓Se incerto, LLM como curadoriaMostrar mais linhas

13. Minha recomendação prática para o próximo passo
Eu faria um experimento bem controlado:
Plain TextEscopo:  5 fluxos reais do SIOPIModo:  shadow mode onlyDuração:  2 semanas ou 100 sugestões de healingMétricas:  false_heal_rate  precision  recall  quarantine_rate  llm_escalation_rate  tempo adicional por testeCritério de sucesso:  false_heal_rate < 2%  precision >= 95%  nenhuma cura crítica errada  evidence package completo em 100% dos casosMostrar mais linhas
A grande mudança é esta:

O objetivo inicial não é fazer o self-healing funcionar automaticamente.
O objetivo inicial é medir se ele merece confiança.

Se ele não merecer confiança, o shadow mode vai mostrar cedo. E isso evita repetir o erro anterior: acreditar na arquitetura antes de testá-la.
