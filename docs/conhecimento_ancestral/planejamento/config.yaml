7. Ordem de prioridade dos locators
Eu implementaria esta ordem:




Plain Text
1. role + accessible name
2. label
3. placeholder
4. test id
5. texto visível, quando for contrato de negócio
6. atributos estáveis de domínio
7. relação com elementos próximos
8. CSS simples
9. XPath apenas como último recurso
Essa prioridade evita que o TestForge nasça dependente de estrutura interna da tela. Também fica alinhada à recomendação do Playwright de usar locators orientados ao usuário e test ids quando a semântica visual não for suficiente.
