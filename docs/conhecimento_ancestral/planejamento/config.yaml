Processamento concluído em 2 etapas
Andre, eu estruturaria isso como um experimento controlado de confiabilidade, não como uma funcionalidade já “pronta”. A pergunta principal não é “o healing funciona?”, mas:

Em quais condições o healing merece confiança suficiente para ser promovido para auto-heal?

