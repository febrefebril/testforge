4. Critérios para aprovar o experimento
Eu só liberaria auto-heal se cumprir todos:




Plain Text
mínimo de 100 sugestões revisadas
false_heal_rate < 2%
precision >= 95%
llm_escalation_rate < 10%
0 falso healing crítico
100% das sugestões promovíveis com evidence package
100% das sugestões promovíveis com oracle pós-ação
nenhum falso healing nos últimos 30 casos revisados
Se a precisão for boa, mas o oracle for fraco, não promove.

5. Critérios de parada
O experimento deve parar se:




Plain Text
false_heal_rate >= 2%
qualquer falso healing crítico
tempo médio aumentar mais de 20%
LLM acionada em mais de 20% dos casos
healing sem evidência
healing sem oracle pós-ação
taxonomia classificando muitas falhas como locator indevidamente
Esse último ponto é importante: se o classificador de falhas erra muito, o healing vai tentar corrigir problema de massa, ambiente ou backend como se fosse locator.

6. Como criar um oracle pós-ação robusto?
Um oracle robusto precisa validar a intenção, não apenas a interação.

A estrutura correta é:




Plain Text
Actionability:
  consigo interagir?

Assertion pós-ação:
  a UI mudou como esperado?

Oracle de negócio:
  a intenção foi cumprida?
6.1 Famílias de oracle
Eu usaria oito famílias.

1. Oracle visual/DOM
Valida que algo apareceu, sumiu ou mudou.




Python
await expect(page.get_by_text("Consulta realizada com sucesso")).to_be_visible()
Bom para sinais rápidos, mas sozinho é fraco.

2. Oracle de URL/rota
Valida navegação ou mudança de rota.




Python
await expect(page).to_have_url(re.compile(".*/resultado"))
Útil em fluxos com mudança de página.

3. Oracle de rede
Valida que a ação chamou o endpoint correto.




Python
async with page.expect_response(
    lambda r: "/api/propostas/consulta" in r.url and r.status == 200
):
    await locator.click()
Esse é muito importante para evitar clicar em botão parecido que chama outro endpoint.

4. Oracle de valor de campo
Valida que o valor foi realmente aplicado.




Python
await expect(page.get_by_label("CPF")).to_have_value(cpf)
Útil para fill, select, check.

5. Oracle de mensagem de sistema
Valida mensagens funcionais.




Python
await expect(page.get_by_text("Proposta encontrada")).to_be_visible()
Cuidado: mensagens genéricas podem gerar falso positivo.

6. Oracle de estado de negócio
Valida se o resultado corresponde ao dado usado.

Exemplo:




Plain Text
CPF pesquisado = 123
resultado exibido contém CPF 123
proposta exibida pertence ao CPF 123
situação exibida é a esperada
Esse é um dos oráculos mais fortes.

7. Oracle via API ou banco de teste
Quando possível, consulte uma fonte controlada.




Plain Text
UI exibiu proposta 456
API de teste confirma que proposta 456 pertence ao CPF informado
Esse oracle é forte, mas exige cuidado com ambiente, massa e segurança.

8. Oracle de acessibilidade/estrutura semântica
Valida se o estado semântico esperado surgiu.




Plain Text
role="table" com accessible name "Resultado da consulta"
role="dialog" com nome "Confirmar operação"
Isso combina bem com Playwright, que incentiva locators orientados a acessibilidade e comportamento visível ao usuário.
