10. O que podemos aproveitar do que já foi feito?
Eu não jogaria fora o que vocês fizeram. Eu reorganizaria.
Aproveitar diretamente
1. Taxonomia de falhas
Ela vira o roteador de decisão.
Plain Textfalha → classificar → escolher estratégiaMostrar mais linhas

