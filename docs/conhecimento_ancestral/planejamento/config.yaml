Eu evitaria reaproveitar como base principal:
Plain Textprompts enormes tentando resolver tudorunner com regras específicas hardcodedgravador tentando gerar script final perfeitofallback sem assertion pós-açãohealing aplicado sem shadow modeauto-heal baseado só em scoreMostrar mais linhas
