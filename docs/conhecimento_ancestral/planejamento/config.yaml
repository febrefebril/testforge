Eu persistiria neste nível de granularidade:
YAMLlocator_observation:  application: SIOPI  page_signature: siopi/propostas/consulta  action_id: step_002  semantic_target_hash: abc123  locator_fingerprint: role:button:Pesquisar  strategy: role  score: 0.97  outcome: success  match_count: 1  duration_ms: 421  failure_reason: null  evidence:    screenshot_before: step_002_before.png    screenshot_after: step_002_after.png    dom_snapshot: step_002_dom.html    ax_snapshot: step_002_ax.jsonMostrar mais linhas
