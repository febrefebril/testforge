2. Como funciona o ranking de score de locators?
O score mede:

“Qual a probabilidade de este locator representar o mesmo alvo semântico gravado?”

Eu não começaria com machine learning. Começaria com score determinístico explicável.

Fórmula inicial



Plain Text
score =
  0.25 * semantic_strength +
  0.20 * uniqueness +
  0.15 * stability +
  0.15 * context_match +
  0.10 * action_compatibility +
  0.10 * historical_success +
  0.05 * simplicity
Critérios
1. semantic_strength
Mede se o locator representa o elemento como o usuário enxerga.

Exemplos fortes:




Python
page.get_by_role("button", name="Pesquisar")
page.get_by_label("CPF")
page.get_by_placeholder("Informe o CPF")
Esses locators são preferíveis porque refletem o comportamento e a acessibilidade da interface, que é justamente a recomendação central do Playwright para testes mais resilientes.
