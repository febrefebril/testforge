2.2 Mas actionability não é sucesso
Esse é o ponto mais importante.
A actionability só diz:

“Eu consigo interagir com esse elemento.”

Ela não diz:

“Eu interagi com o elemento certo.”

Por isso toda ação precisa de uma assertion pós-ação.
Exemplo:
Pythonawait page.get_by_role("button", name="Pesquisar").click()await expect(    page.get_by_role("table", name="Resultado da consulta")).to_be_visible()Mostrar mais linhas
Sem assertion pós-ação, o TestForge pode clicar no botão errado e achar que curou o teste. Esse é o falso healing.

3. Como persistir o histórico de sucesso?
Persistir histórico é obrigatório. Sem histórico, cada execução começa “burra”.
Ferramentas de self-healing como Healenium usam uma arquitetura com backend e banco para armazenar seletores, healing, histórico e relatórios. Isso é importante porque o sistema aprende quais locators funcionaram em quais contextos. [playwright.dev], [chromewebs...google.com]
Além disso, há ferramentas que dependem de uma execução bem-sucedida anterior para capturar o contexto correto do elemento antes de conseguir aplicar self-healing com segurança. [selenium.dev]

