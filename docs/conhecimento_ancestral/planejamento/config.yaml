Cada elemento deve ter vários candidatos:




Python
@dataclass
class LocatorCandidate:
    strategy: LocatorStrategy
    value: str
    playwright: str
    score: float
    reason: str
Exemplo:




YAML
locator_candidates:
  - strategy: label
    value: CPF
