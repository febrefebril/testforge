Esse pacote complementa o pacote anterior do EvidenceCollector: Pacote TestForge Evidence Collector

1. Como integrar o PromotionGate no fluxo?
O PromotionGate entra depois que o fluxo já registrou:




Plain Text
1. healing_suggestion
2. evidence_package
3. oracle_observation
4. opcionalmente review_decision
Fluxo final:




Plain Text
synthetic_failure_demo
  ↓
EvidenceCollector.finish_step()
  ↓
EvidenceStore.insert_healing_suggestion()
  ↓
EvidenceStore.insert_evidence_package()
  ↓
EvidenceStore.insert_oracle_observation()
  ↓
PromotionGateIntegration.evaluate_shadow_validation()
  ↓
EvidenceStore.insert_promotion_decision()
No pacote novo, criei o arquivo:




Plain Text
promotion_gate_integration.py
Ele faz exatamente essa ponte: busca evidências, métricas e bloqueadores no banco, monta um PromotionContext, chama o PromotionGate e registra a decisão.

Exemplo de uso:




Python
from evidence_store import EvidenceStore
from evidence_store_extensions import monkey_patch_evidence_store
from promotion_gate_integration import PromotionGateIntegration

monkey_patch_evidence_store(EvidenceStore)

store = EvidenceStore("testforge_healing.sqlite")
gate_integration = PromotionGateIntegration(store)

decision = gate_integration.evaluate_shadow_validation(
    healing_suggestion_id=suggestion_id
)

print(decision)

