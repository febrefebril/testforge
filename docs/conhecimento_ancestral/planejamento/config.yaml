Estou com um problema no meu testforge. A questão é a seguinte. Começamos tentado resolver tudo pelo gravador, identificar todas as tecnologias e já gerar um script robusto. Usando essa abordagem nós tinhamos que sempre alterar o gravador para cada passo gravado pois ele quebrava muito. Depois nós mudamos essa parte para o runner que rodava esse código. Ele agora era o responsável por corrigir a gravação e a gravação só tentava pegar o máximo de informações durante a gravação. O problema é que novamente, nossa aplicação quebrava a todo passo e tinhamos que corrigir o runner. Depois criamos uma abordagem para criar um selfhealing para o runner usando llm dado que estava insustentável ficar o tempo todo corrigindo o runner. Agora caimos em um outro problema, o prompt para a llm não consegue resolver e temos que ficar alterando o prompt. O problema só foi mudando de lugar. Precisamos de uma solução que seja simples, elegante e eficiente. Acho que o problema está na arquitetura. Faça uma pesquisa para saber como resolver esse problema de gravar testes que não quebrem logo após a gravação e que nasçam com selfhealing deterministico e se essa barreira for rombida usar llm para curar.
