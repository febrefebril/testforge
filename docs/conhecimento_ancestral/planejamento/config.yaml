Minha proposta de arquitetura para o TestForge
A solução simples, elegante e eficiente seria transformar o TestForge em um pipeline com estas camadas:




Plain Text
Recorder Sensorial
        ↓
Modelo Intermediário Semântico
        ↓
Compilador Determinístico
        ↓
Runner Playwright
        ↓
Self-Healing Determinístico
        ↓
Curadoria com LLM, somente se necessário
A mudança principal é esta:

O gravador não gera teste final.
O runner não “inventa” correção.
A LLM não é o mecanismo principal de healing.
O centro da arquitetura passa a ser um modelo intermediário semântico + motor determinístico de healing.

Como o teste deve nascer
Em vez de gravar algo assim:




Python
await page.locator("#btn123").click()
O TestForge deveria gerar internamente algo assim:




YAML
action_id: step_004
intent: clicar no botão de pesquisar proposta
action: click

target:
  semantic_role: button
  accessible_name: Pesquisar
  visible_text: Pesquisar
  test_id: null
  label: null

context:
  page_url_pattern: /siopi/propostas
  form_title: Consulta de Propostas
  nearby_texts:
    - CPF
    - Número da Proposta
    - Situação
  frame: null
  shadow_dom: false

locator_candidates:
  - type: role
    value: button[name="Pesquisar"]
    score: 0.95
  - type: text
    value: text="Pesquisar"
    score: 0.82
  - type: css
    value: button[type="submit"]
    score: 0.63

assertion_after_action:
  expected:
    - tabela de resultados visível
    - requisição de consulta concluída

Mostrar mais linhas
Depois o compilador gera Playwright Python a partir desse contrato. O script nasce robusto porque nasce com intenção, contexto, alternativas e critério de sucesso, não apenas com selector.

O self-healing determinístico
Quando um passo quebra, o TestForge não deveria chamar a LLM imediatamente. O fluxo deveria ser:




Plain Text
1. Tentar locator primário.
2. Se falhar, tentar locators alternativos gravados.
3. Se falhar, reextrair DOM + accessibility tree.
4. Gerar candidatos.
5. Calcular score de similaridade.
6. Se score >= 0.90: auto-heal.
7. Se 0.70 <= score < 0.90: quarentena/curadoria.
8. Se score < 0.70: falha real.
9. Persistir decisão, evidências e diff.
Essa abordagem se alinha ao que aparece em Healenium, Testim, mabl e nas recomendações modernas de Playwright: múltiplos sinais, locators semânticos, baseline histórico, retry controlado e healing com evidência.
github
+3

Onde a LLM entra
A LLM deve entrar depois que o determinístico falhou, e não como motor principal.

Ela deve receber um pacote fechado de evidências:




YAML
failed_step:
  intent: clicar no botão de pesquisar proposta
  old_locator: "#btn123"
  error: element not found

evidence:
  old_dom_fragment: ...
  current_dom_candidates:
    - candidate_id: c1
      role: button
      text: Consultar
      nearby_texts: [CPF, Número da Proposta]
      score: 0.74
    - candidate_id: c2
      role: button
      text: Limpar
      score: 0.41

request:
  task: propor cura ou regra nova
  constraints:
    - não alterar intenção do teste
    - não criar seletor sem evidência
    - justificar decisão
    - retornar patch estruturado

Mostrar mais linhas
A resposta da LLM não deve ser “o novo seletor é X”. Ela deve ser uma proposta de curadoria:




YAML
decision: suggested_heal
candidate_id: c1
reason: botão mudou de texto de Pesquisar para Consultar, mantendo contexto do formulário de consulta
confidence: 0.82
requires_human_review: true
suggested_rule:
  app: SIOPI
  page_pattern: /siopi/propostas
  synonym:
    Pesquisar: Consultar
Assim o prompt deixa de ser um monstro frágil e vira um protocolo estável de curadoria.

A regra de ouro
A frase que eu usaria como princípio arquitetural do TestForge é:

Self-healing deve ser determinístico por padrão, probabilístico apenas com score controlado, e generativo somente como curadoria auditável.

Ou seja:




Plain Text
Determinístico primeiro.
LLM depois.
Humano quando houver ambiguidade.
Decisão arquitetural recomendada
Eu recomendo abandonar a ideia de que o TestForge deve “gravar e gerar script final” diretamente.

A arquitetura correta seria:

1. Recorder como coletor de evidências
Ele captura:

evento;
DOM fragmentado;
accessibility tree;
texto visível;
role;
label;
atributos;
posição relativa;
screenshot/crop opcional;
URL;
frame;
shadow DOM;
rede associada;
estado antes/depois.
2. Intermediate Representation como fonte de verdade
Esse modelo é o “coração” do TestForge.

Ele representa:

intenção;
ação;
alvo;
contexto;
candidatos;
assertions;
critérios de sucesso.
3. Compiler como gerador de código
Gera Playwright Python com:

get_by_role;
get_by_label;
get_by_test_id;
assertions;
waits orientados a estado;
fixtures;
logging;
trace.
4. Runner como executor burro e observável
Ele executa, coleta evidência e delega healing.

5. Healing Engine como serviço próprio
Ele decide com score, persiste e audita.

6. LLM como curador
A LLM não executa teste. Ela propõe evolução de regra.

MVP que eu faria agora
Eu dividiria em três entregas:

MVP 1 — Teste nasce com identidade composta
parar de gerar script direto do evento cru;
criar modelo intermediário;
gerar locators por ranking;
salvar múltiplos candidatos por ação;
usar Playwright locators semânticos primeiro.
MVP 2 — Healing determinístico
ao falhar locator, reextrair DOM/acessibilidade;
calcular similaridade;
auto-heal com threshold alto;
persistir healing;
gerar relatório de evidência.
MVP 3 — Curadoria com LLM
LLM só recebe casos em quarentena;
resposta estruturada em JSON/YAML;
patch sugerido;
aprovação humana;
regra reaproveitável.
Conclusão
A solução elegante é parar de tentar “consertar o consertador”. O TestForge precisa de uma arquitetura em que:

o gravador observa;
o modelo intermediário representa intenção;
o compilador gera código;
o runner executa;
o healing determinístico recupera com score;
a LLM cura exceções e evolui regras.
Isso evita que o problema fique migrando de lugar. O prompt deixa de ser o sistema nervoso da solução e passa a ser apenas uma ferramenta de apoio para casos que realmente escaparam da heurística.

