8. Scoring inicial
Para o MVP, você não precisa de ML. Comece com score determinístico.

Exemplo:




Plain Text
score =
  0.30 * role_match +
  0.25 * accessible_name_match +
  0.15 * label_match +
  0.10 * nearby_text_match +
  0.10 * attribute_stability +
  0.05 * dom_position_similarity +
  0.05 * historical_success
Critérios:




Plain Text
score >= 0.90
    locator confiável

0.75 <= score < 0.90
    locator utilizável, mas monitorado

0.60 <= score < 0.75
    exigir fallback ou curadoria

score < 0.60
    não gerar automaticamente
Essa abordagem também deixa o caminho preparado para self-healing determinístico, parecido com o que Healenium faz ao interceptar falhas, comparar DOM e registrar healing/histórico, mas adaptado ao universo Playwright/TestForge.
