Antes de deixar o healing agir, rodar em modo sombra:
Plain Text1. O teste quebra.2. O TestForge calcula qual locator usaria.3. Mas não aplica automaticamente.4. Um humano compara a sugestão.5. Medimos acerto/erro.Mostrar mais linhas
Só depois de uma taxa aceitável, liberar auto-heal.

6.6 Kill criteria
Definir critérios de morte do experimento:
Plain Textfalso healing > 2%tempo de execução > 20% acima do baselineLLM acionada em > 20% dos casosfallback gera mais flakinesshealing sem evidence packagehealing sem assertion pós-açãoMostrar mais linhas
Se bater nesses critérios, a arquitetura não está pronta.

7. Minha avaliação final
Esse plano é melhor que o anterior por um motivo: ele é falsificável.
A arquitetura anterior dependia de esperança:
Plain Textvamos melhorar o gravadorvamos melhorar o runnervamos melhorar o promptMostrar mais linhas
A nova arquitetura precisa depender de medição:
Plain Textquantos candidatos gerou?qual score?qual match count?qual actionability?qual assertion pós-ação?qual histórico?qual taxa de falso healing?quantas vezes a LLM foi necessária?Mostrar mais linhas
Então a resposta mais honesta é:

Não temos garantia de que vai funcionar.
Mas agora conseguimos descobrir cedo se não funciona.

E isso, arquiteturalmente, é um avanço enorme.
