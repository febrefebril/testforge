10. Política por família de erro
Nem toda falha deve ativar healing.




YAML
failure_policy:
  LOCATOR_NOT_FOUND:
    allow_healing: true
    action: generate_candidates

  LOCATOR_AMBIGUOUS:
    allow_healing: true
    action: refine_context

  ACTIONABILITY_OBSCURED:
    allow_healing: false
    action: detect_overlay_or_spinner

  ACTIONABILITY_DISABLED:
    allow_healing: false
    action: validate_state_permission_or_data

  ASSERTION_FAILED:
    allow_healing: false
    action: investigate_bug_data_or_oracle

  NETWORK_FAILURE:
    allow_healing: false
    action: classify_environment_or_backend

  TEST_DATA_FAILURE:
    allow_healing: false
    action: refresh_or_recreate_mass

