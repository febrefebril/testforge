O Playwright já faz actionability checks antes de ações como click, fill e check, validando condições como visibilidade, estabilidade, habilitação e capacidade de receber eventos. O TestForge deve usar isso a favor do ranking e do fallback, não tentar substituir com waits manuais frágeis.
