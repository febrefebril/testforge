1. Como criar o EvidenceCollector com Playwright?
O EvidenceCollector deve ser um componente isolado. Ele não decide healing, não promove locator e não chama LLM. Ele apenas coleta e organiza evidências.

Ele coleta:




Plain Text
screenshot_before.png
screenshot_after.png
dom_before.html
dom_after.html
ax_tree_before.json
ax_tree_after.json
network_log.json
score_breakdown.json
oracle_results.json
promotion_decision.json
trace.zip
manifest.json
O Playwright já possui recursos úteis para isso, como screenshots, tracing, auto-waiting, actionability checks e web-first assertions; o TestForge deve reaproveitar esses recursos em vez de criar waits e logs improvisados.
mabl
+1

Uso básico



Python
collector = EvidenceCollector(page, root_dir="evidence", enable_trace=True)

metadata = EvidenceMetadata(
    run_id="run-synthetic-001",
    action_id="step-search-client",
    application="fake-react-bank-app",
    page_signature="fake-react-bank-app/search-client",
    taxonomy_code="LOCATOR_NOT_FOUND",
    technology_profile="react",
    original_locator="page.get_by_role('button', name='Pesquisar')",
    suggested_locator="page.get_by_test_id('btn-search-client')",
    mode="shadow",
)

await collector.start_step(metadata)

# Executa tentativa original, healing shadow, oracle etc.

manifest = await collector.finish_step(
    score_breakdown={
        "semantic_score": 0.82,
        "uniqueness_score": 0.91,
        "actionability_score": 1.0,
        "historical_score": 0.0,
        "total_score": 0.88,
    },
    oracle_results=[
        {
            "type": "visual_dom",
            "expected": "Tabela Resultado da consulta visível",
            "actual": "visible",
            "result": "passed",
        }
    ],
    promotion_decision={
        "state": "experimental",
        "allowed": False,
        "reason": "Requer revisão humana e histórico.",
    },
)

