4. Como implementar fallback determinístico?
Fallback determinístico é:

“Tentar candidatos em ordem objetiva, com regras fixas, sem LLM, e só aceitar sucesso se a intenção for validada.”

Fluxo:




Plain Text
1. Ordenar candidatos por score.
2. Remover candidatos abaixo do threshold mínimo.
3. Tentar locator primário.
4. Validar se resolve um elemento.
5. Validar actionability.
6. Executar ação.
7. Validar assertion pós-ação.
8. Se passar, persistir sucesso.
9. Se falhar, tentar próximo candidato.
10. Se todos falharem, acionar healing determinístico.
11. Se healing não tiver confiança, acionar LLM/curadoria.
Thresholds sugeridos



Plain Text
score >= 0.90
    candidato primário

0.75 <= score < 0.90
    fallback aceitável

0.60 <= score < 0.75
    fallback fraco; só usar com assertion pós-ação forte

score < 0.60
    não usar automaticamente
5. Regra essencial do fallback
O fallback não pode ser considerado sucesso só porque conseguiu clicar.

Ele só é sucesso se a intenção foi cumprida.

Exemplo:




Python
await locator.click()
await expect(page.get_by_role("table", name="Resultado da consulta")).to_be_visible()
Ou seja:




Plain Text
click funcionou?             Não basta.
estado esperado apareceu?    Aí sim.
Essa é a diferença entre:




Plain Text
“consegui interagir com algo”
e:




Plain Text
“executei corretamente a intenção do teste”
6. Exemplo de implementação conceitual



Python
async def execute_with_fallback(action, candidates, post_assertion):
    candidates = sorted(candidates, key=lambda c: c.score, reverse=True)

    for candidate in candidates:
        if candidate.score < 0.60:
            continue

        try:
            locator = resolve_locator(candidate)

            count = await locator.count()
            if count != 1:
                raise AmbiguousLocatorError(candidate, count)

            await expect(locator).to_be_visible()
            await expect(locator).to_be_enabled()

            if action.type == "click":
                await locator.click()

            elif action.type == "fill":
                await locator.fill(action.input_value)

            await post_assertion()

            persist_success(candidate)
            return candidate

        except Exception as error:
            persist_failure(candidate, error)
            continue

    raise LocatorFallbackExhausted(action)

