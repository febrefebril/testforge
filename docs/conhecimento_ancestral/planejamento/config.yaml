4.1 Labels da revisão
A fila de revisão deve permitir classificar:




Plain Text
TRUE_POSITIVE_HEAL
FALSE_HEAL
NOT_RECOVERABLE
ORACLE_WEAK
TAXONOMY_WRONG
TECHNOLOGY_PROFILE_WRONG
INCONCLUSIVE
Esses labels são muito importantes porque alimentam o aprendizado do sistema.

Exemplo:




Plain Text
Se muitos casos forem TAXONOMY_WRONG:
  melhorar classificador de falhas.

Se muitos forem ORACLE_WEAK:
  melhorar oracle pós-ação.

Se muitos forem TECHNOLOGY_PROFILE_WRONG:
  melhorar detector React/Angular/JSF/etc.

Se muitos forem FALSE_HEAL:
  aumentar thresholds e melhorar semantic gap.
5. Como usar sistemas falsos para testar tudo?
Aqui está um ponto essencial: vocês não devem depender apenas de encontrar casos reais nos ambientes CAIXA.

A solução é criar um TestForge Synthetic Lab.

Ele seria um conjunto de aplicações falsas, controladas e mutáveis:




Plain Text
fake-react-bank-app
fake-angular-form-app
fake-jsf-like-legacy-app
fake-iframe-app
fake-shadow-dom-app
fake-design-system-app
Essas aplicações não precisam ser grandes. Elas precisam ser projetadas para quebrar de forma controlada.

5.1 Exemplo de mutações sintéticas



YAML
mutations:
  locator:
    - change_id
    - change_css_class
    - remove_data_testid
    - duplicate_button_text
    - change_accessible_name

  actionability:
    - add_overlay
    - disable_button
    - delayed_enable
    - animation_before_click

  synchronization:
    - delayed_render
    - debounce_search
    - delayed_network_response
    - spinner_timeout

  react:
    - rerender_component
    - portal_modal
    - virtualized_row_unmounted

  angular:
    - material_overlay
    - async_validator_pending
    - router_navigation_delay

