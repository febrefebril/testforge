8. Como adaptar a taxonomia para diferentes tecnologias?
A taxonomia deve ter duas camadas:




Plain Text
1. Núcleo comum
2. Extensão tecnológica
O núcleo comum classifica falhas universais. A extensão tecnológica trata comportamentos específicos de framework, design system, iframe, shadow DOM etc.

9. Núcleo comum da taxonomia



YAML
common_failure_taxonomy:
  locator_resolution:
    - LOCATOR_NOT_FOUND
    - LOCATOR_AMBIGUOUS
    - LOCATOR_STALE
    - LOCATOR_WRONG_CONTEXT

  actionability:
    - ACTIONABILITY_NOT_VISIBLE
    - ACTIONABILITY_DISABLED
    - ACTIONABILITY_OBSCURED
    - ACTIONABILITY_NOT_EDITABLE
    - ACTIONABILITY_UNSTABLE

  synchronization:
    - PAGE_NOT_READY
    - NETWORK_IDLE_TIMEOUT
    - SPINNER_TIMEOUT
    - DEBOUNCE_PENDING
    - ASYNC_RENDER_PENDING

  assertion:
    - ASSERTION_FAILED
    - ORACLE_WEAK
    - ORACLE_CONFLICT
    - EXPECTED_STATE_NOT_REACHED

  environment:
    - NETWORK_FAILURE
    - BACKEND_FAILURE
    - AUTHORIZATION_FAILURE
    - SESSION_EXPIRED
    - TEST_DATA_FAILURE

  context:
    - FRAME_CONTEXT_FAILURE
    - SHADOW_DOM_CONTEXT_FAILURE
    - POPUP_OR_TAB_CONTEXT_FAILURE

