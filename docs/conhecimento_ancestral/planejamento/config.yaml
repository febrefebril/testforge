3. Como medir a precisão do oracle pós-ação?
O oracle pós-ação precisa ser tratado como um classificador.

Ele pode acertar ou errar. Então precisa de matriz de confusão.




Plain Text
TP: oracle aprovou e a cura estava correta.
FP: oracle aprovou, mas a cura estava errada.
TN: oracle rejeitou e a cura estava errada.
FN: oracle rejeitou, mas a cura estava correta.
A métrica mais importante é:




Plain Text
oracle_precision = TP / (TP + FP)
Porque o erro mais perigoso é o FP:

O oracle aprovou uma cura errada.

Esse é o falso healing passando como sucesso.

3.1 Métricas recomendadas



Plain Text
oracle_precision =
  TP / (TP + FP)

oracle_recall =
  TP / (TP + FN)

oracle_f1 =
  2 * precision * recall / (precision + recall)

false_acceptance_rate =
  FP / (TP + FP)

false_rejection_rate =
  FN / (TP + FN)

Mostrar mais linhas
Critério inicial:




Plain Text
oracle_precision >= 95%
false_acceptance_rate < 2%
mínimo de 30 observações revisadas por tipo de oracle
O Playwright já oferece auto-waiting, actionability checks e web-first assertions, mas isso valida prontidão e estado observável; não substitui o oracle de negócio.
dev
+1

3.2 Oracle robusto precisa combinar sinais
Para uma ação crítica, eu exigiria pelo menos dois oracles:




YAML
post_action_oracle:
  - type: network
    expected: "/api/propostas/consulta status 200"

  - type: visual_dom
    expected: "tabela Resultado da consulta visível"

  - type: business_state
    expected: "resultado contém CPF informado"
Regra:




Plain Text
Um oracle visual sozinho não promove healing.
Um oracle de rede sozinho não promove healing.
Um oracle de negócio aumenta muito a confiança.
Oracles conflitantes mandam para revisão humana.
4. Como registrar e revisar evidências no shadow mode?
Cada sugestão de healing precisa gerar um Evidence Package.

Esse pacote deve ser persistido e revisável.




