3. Como priorizar épicos no MVP?
Para o TestForge, o MVP não deve priorizar “quantidade de funcionalidade”. Ele deve priorizar redução de incerteza arquitetural.
Eu usaria estes critérios, com notas de 1 a 5:
Plain Textvalor_aprendizado:  quanto o épico ajuda a provar ou invalidar a arquiteturareducao_risco:  quanto reduz risco de falso healing, flakiness ou decisão erradadependencia:  quanto outros épicos dependem deleobservabilidade:  quanto melhora medição, auditoria e revisãoesforco_inverso:  quanto menor o esforço, maior a notaMostrar mais linhas
Fórmula:
Plain Textpriority_score =  0.30 * valor_aprendizado +  0.25 * reducao_risco +  0.20 * dependencia +  0.15 * observabilidade +  0.10 * esforco_inversoMostrar mais linhas

