1. Como calcular o score de uniqueness?
A forma ingênua seria:




Plain Text
count == 1 → único
count > 1  → ambíguo
count == 0 → inexistente
Mas isso é fraco. Um locator pode retornar um único elemento hoje e ficar ambíguo amanhã. Ou pode retornar quatro elementos na tela inteira, mas apenas um dentro do formulário correto.

Então eu calcularia uniqueness com quatro dimensões:




Plain Text
uniqueness_score =
  0.40 * cardinality_score +
  0.25 * context_uniqueness_score +
  0.20 * semantic_gap_score +
  0.15 * cross_snapshot_stability_score
1.1 cardinality_score
Mede quantos elementos o locator encontra.

1.1 cardinality_score
Mede quantos elementos o locator encontra.
Pythondef cardinality_score(count: int) -> float:    if count <= 0:        return 0.0    if count == 1:        return 1.0    if count == 2:        return 0.55    if count == 3:        return 0.40    return max(0.10, 1.0 / count)Mostrar mais linhas
Exemplo:
Plain Text1 match  → 1.002 matches → 0.553 matches → 0.405 matches → 0.20Mostrar mais linhas
Mas atenção: count == 1 sozinho não prova que o locator é bom. Ele só prova que ele é único naquele momento.

1.2 context_uniqueness_score
Esse é mais importante para sistemas corporativos como SIOPI, porque a tela pode ter vários botões iguais.
Exemplo:
Plain TextPesquisar clientePesquisar propostaPesquisar contratoPesquisar convênioMostrar mais linhas
O locator:
Pythonpage.get_by_text("Pesquisar")Mostrar mais linhas
pode encontrar vários elementos. Mas se o contexto do passo era o formulário de proposta, e dentro daquele formulário existe só um botão Pesquisar, ele pode ser aproveitável com refinamento contextual.
Pythondef context_uniqueness_score(total_matches: int, matches_in_context: int) -> float:    if total_matches <= 0:        return 0.0    if matches_in_context == 1:        return 1.0    if matches_in_context > 1:        return 0.50    return 0.0Mostrar mais linhas
Exemplo:
Plain Texttotal_matches = 5matches_in_expected_context = 1context_uniqueness_score = 1.0Mostrar mais linhas
Isso significa:

O locator é ambíguo globalmente, mas pode ser confiável se restringido ao contexto correto.

Essa ideia conversa com a recomendação do Playwright de usar locators que representam como o usuário percebe a tela, mas com refinamento quando houver ambiguidade. O Playwright recomenda locators como role, label, placeholder e test id justamente para evitar dependência de detalhes frágeis do DOM. [testim.io], [testim.io]

1.3 semantic_gap_score
Esse ponto é essencial para evitar falso healing.
Quando o sistema encontra candidatos, ele deve comparar:
Plain Textmelhor candidato vs segundo melhor candidatoMostrar mais linhas
Se os dois são quase iguais, há risco de ambiguidade.
Pythondef semantic_gap_score(best_similarity: float, second_best_similarity: float) -> float:    return max(0.0, min(1.0, best_similarity - second_best_similarity))Mostrar mais linhas
Exemplo bom:
Plain Textbest_similarity = 0.94second_best_similarity = 0.41gap = 0.53Mostrar mais linhas
Exemplo perigoso:
Plain Textbest_similarity = 0.83second_best_similarity = 0.80gap = 0.03Mostrar mais linhas
Mesmo que o melhor candidato tenha score razoável, um gap pequeno indica:

“Eu acho que é esse elemento, mas existe outro quase igual.”

Nesse caso, não deveria haver auto-heal. Deveria ir para quarentena ou curadoria.

1.4 cross_snapshot_stability_score
Um locator bom precisa continuar único em variações de tela.
Você deve testar o locator contra múltiplos snapshots:
Plain Textsnapshot após loginsnapshot com dados vaziossnapshot com dados preenchidossnapshot com erro de validaçãosnapshot com resultado carregadosnapshot em viewport diferenteMostrar mais linhas
Pythondef cross_snapshot_stability_score(stable_unique_snapshots: int, total_snapshots: int) -> float:    if total_snapshots <= 0:        return 0.0    return stable_unique_snapshots / total_snapshotsMostrar mais linhas
Exemplo:
Plain TextFoi único em 4 de 5 snapshots → 0.80Foi único em 1 de 5 snapshots → 0.20Mostrar mais linhas

