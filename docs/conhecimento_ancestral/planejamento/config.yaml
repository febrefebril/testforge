Processamento concluído em 16 etapas
Andre, fiz a pesquisa e minha conclusão é bem direta: o problema não é o prompt, nem o runner, nem o gravador isoladamente. O problema é que a arquitetura atual está tentando “inferir intenção” no lugar errado. Cada vez que vocês moveram a inteligência para outra camada, a fragilidade foi junto.

Gerei também um artefato em Markdown com a proposta resumida para download: testforge_arquitetura_selfhealing_deterministico.md

Diagnóstico
Vocês passaram por esta sequência:

Gravador inteligente demais
Tentava detectar tecnologia, gerar seletor robusto e produzir script final. Quebrava a cada variação.

Runner inteligente demais
O gravador virou coletor de evidências, e o runner passou a corrigir. O problema mudou de lugar.

Runner com self-healing via LLM
A LLM passou a corrigir o runner. Agora o ponto frágil virou o prompt.

Isso é um sintoma clássico de arquitetura sem separação clara entre:

captura;
representação semântica;
geração;
execução;
healing;
curadoria.
A pesquisa confirma que as abordagens mais resilientes não dependem de “um seletor mágico” nem de LLM em tempo real como primeira linha. Elas combinam locators semânticos, múltiplos sinais, fallbacks, pontuação de confiança, persistência de healing e, só depois, IA/LLM como camada de curadoria. Playwright recomenda testar comportamento visível ao usuário e usar locators como role, label, text e test id, evitando depender de detalhes internos frágeis de DOM/CSS.
