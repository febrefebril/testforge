Critério:




Plain Text
100% das mutações conhecidas classificadas
false healing < 2%
oracle_precision >= 95%
zero auto-heal em caso não recuperável
Nível 2 — Shadow mode em ambiente real
Objetivo:




Plain Text
medir comportamento com ruído real
massa realista
perfis reais
timing real
componentes reais
Critério:




Plain Text
mínimo 100 sugestões revisadas
precision >= 95%
false_heal_rate < 2%
0 falso healing crítico
Nível 3 — Canary
Objetivo:




Plain Text
liberar auto-heal em poucos fluxos de baixo risco
com rollback
com revisão obrigatória posterior
Critério:




Plain Text
