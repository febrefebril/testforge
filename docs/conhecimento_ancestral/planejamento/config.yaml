3.2 Não use apenas success / total
Se um locator teve:
Plain Text1 sucesso0 falhasMostrar mais linhas
O cálculo ingênuo daria:
Plain Text100% confiávelMostrar mais linhas
Isso é falso. Ele só tem pouca evidência.
Eu usaria Wilson lower bound para ter uma estimativa conservadora.
Pythondef wilson_lower_bound(successes: int, total: int, z: float = 1.96) -> float:    if total <= 0:        return 0.0    phat = successes / total    denominator = 1 + z * z / total    centre = phat + z * z / (2 * total)    margin = z * sqrt((phat * (1 - phat) + z * z / (4 * total)) / total)    return (centre - margin) / denominatorMostrar mais linhas
Exemplo conceitual:
Plain Text1 sucesso / 1 execução   → score conservador baixo10 sucessos / 10 execuções → score melhor100 sucessos / 100 execuções → score muito altoMostrar mais linhas
Isso evita que um locator seja promovido para primário depois de uma única execução feliz.

