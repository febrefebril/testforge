3. Métricas obrigatórias
Eu mediria:




Plain Text
pass_rate
locator_failure_rate
recoverable_locator_failure_rate
heal_suggestion_rate
true_positive_heal_rate
false_heal_rate
precision
recall
quarantine_rate
llm_escalation_rate
mean_extra_runtime_percent
post_action_oracle_pass_rate
human_review_agreement_rate
Fórmulas principais



Plain Text
false_heal_rate =
  false_heals / reviewed_heal_suggestions



Plain Text
precision =
  true_positive_heals / reviewed_heal_suggestions



Plain Text
