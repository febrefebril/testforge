4. Classe principal: SemanticAction
Cada passo gravado vira uma SemanticAction.

Exemplo conceitual:




Python
@dataclass
class SemanticAction:
    action_id: str
    intent: str
    action: ActionType
    target: SemanticTarget
    context: ActionContext
    locator_candidates: list[LocatorCandidate]
    input_value: Optional[str] = None
    expected_after_action: list[dict] = field(default_factory=list)
Ela não representa apenas “cliquei em X”. Ela representa:

o que o usuário queria fazer;
em qual elemento;
em qual contexto;
quais evidências existiam;
quais locators candidatos foram encontrados;
qual critério comprova que a ação funcionou.
5. SemanticTarget: a identidade composta do elemento
O alvo não pode ser só CSS/XPath. Ele precisa ser uma composição de sinais:




Python
@dataclass
class SemanticTarget:
    role: Optional[str]
    accessible_name: Optional[str]
    label: Optional[str]
    placeholder: Optional[str]
    visible_text: Optional[str]
    test_id: Optional[str]
    attributes: dict[str, Any]
    dom_fingerprint: DomFingerprint
Exemplo:




YAML
target:
  role: textbox
  accessible_name: CPF
  label: CPF
  placeholder: Informe o CPF
  visible_text: null
  test_id: null
  attributes:
    name: cpf
    type: text
  dom_fingerprint:
    tag: input
    normalized_path_hash: abc123
    sibling_index: 2

