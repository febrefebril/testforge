Eu criaria plugins pequenos, não regras espalhadas no runner.
Plain TextTechnologyProfileDetector  detecta pistas da tecnologiaTechnologyPolicy  altera pesos e estratégiasTechnologyRecoveryPlugin  trata casos específicosMostrar mais linhas
