7. Critérios de aceite do gravador
US-03.01 — Iniciar e finalizar sessão de gravação
Critérios:




Plain Text
- O usuário consegue iniciar uma sessão de gravação.
- A sessão recebe um recording_id único.
- A sessão cria diretório em recordings/{recording_id}.
- A sessão gera recording_metadata.json.
- A sessão pode ser finalizada explicitamente.
US-03.02 — Capturar eventos básicos
Critérios:




Plain Text
- Captura click.
- Captura fill.
- Captura navigation.
- Captura submit quando detectável.
- Cada evento é salvo em raw_events.jsonl.
- Cada evento possui timestamp, url, tipo e alvo.
US-03.03 — Capturar snapshot do alvo
Critérios:




Plain Text
- Para cada evento, captura tag, text, role, accessible_name, id, name, test_id e attributes.
- Captura bounding box quando disponível.
- Captura contexto de frame/shadow DOM quando aplicável.
- Não escolhe locator definitivo.
US-03.04 — Capturar contexto da página
Critérios:




Plain Text
- Captura page title.
- Captura URL.
- Captura textos próximos ao elemento.
- Captura DOM snapshot.
- Captura accessibility snapshot quando disponível.
- Captura network log básico.
US-03.05 — Persistir RawRecordedSession
Critérios:




Plain Text
- Cria raw_events.jsonl.
- Cria diretórios screenshots, dom_snapshots e ax_snapshots.
- Cria recording_metadata.json.
- Registra política sensitive_data_alert em modo alert_only.
- Não mascara dados automaticamente.
US-03.06 — Gerar SemanticTestCase inicial
Critérios:




Plain Text
- Lê raw_events.jsonl.
- Gera semantic_test_case.yaml.
- Cada evento vira SemanticAction.
- Cada alvo vira SemanticTarget.
- Gera candidatos iniciais de locator.
- Não gera ainda healing automático.
US-03.07 — Compilar teste Playwright inicial
Critérios:




Plain Text
- Lê semantic_test_case.yaml.
- Gera test_*.py em generated_tests/.
- Usa locators priorizados.
- Inclui assertions básicas quando existirem oracles.
- O teste gerado roda contra fake-react-bank-app.
