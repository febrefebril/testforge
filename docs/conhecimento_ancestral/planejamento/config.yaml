3. Como evoluir o slice com novas mutações?
A evolução deve ser feita por uma matriz de mutações, não por casos soltos hardcoded.

Incluí no pacote:




Plain Text
mutation_matrix.yaml
Exemplo:




YAML
- code: duplicate_button_text
  app: fake-react-bank-app
  technology: react
  url_query: "mutation=duplicate_button_text"
  expected_taxonomy: LOCATOR_AMBIGUOUS
  expected_recoverable: true
  expected_strategy: "refine_by_context_or_testid"
  expected_oracles: [visual_dom, business_state]
Para adicionar uma nova mutação, o processo deve ser sempre:




Plain Text
1. Adicionar entrada no mutation_matrix.yaml.
2. Implementar a mutação no fake app.
3. Declarar taxonomia esperada.
4. Declarar se é recuperável.
5. Declarar estratégia esperada.
6. Declarar oracles esperados.
7. Rodar Synthetic Lab.
8. Registrar resultado no banco.
Exemplo de nova mutação
Caso: botão fica desabilitado
No mutation_matrix.yaml:




YAML
- code: disabled_button
  app: fake-react-bank-app
  technology: react
  url_query: "mutation=disabled_button"
  expected_taxonomy: ACTIONABILITY_DISABLED
  expected_recoverable: false
  expected_strategy: "state_or_test_data_diagnosis"
  expected_oracles: []
Interpretação:




Plain Text
Não é problema de locator.
Não deve acionar locator healing.
Deve classificar como actionability/state/data.
Esse tipo de mutação é fundamental para evitar que o TestForge tente “curar” o elemento errado quando o problema real é estado, permissão, massa ou timing.

4. Como o PromotionGate usa as revisões?
O fluxo de revisão deve registrar labels como:




Plain Text
TRUE_POSITIVE_HEAL
FALSE_HEAL
NOT_RECOVERABLE
ORACLE_WEAK
TAXONOMY_WRONG
TECHNOLOGY_PROFILE_WRONG
INCONCLUSIVE
Depois o gate calcula bloqueadores.

Exemplos:




Plain Text
Se existe FALSE_HEAL:
  não promove.

Se existe TAXONOMY_WRONG não resolvido:
  não promove.

Se existe ORACLE_WEAK:
  não promove até melhorar oracle.

Se há conflito entre oracles:
  não promove.

Se evidence package está incompleto:
  não promove.

