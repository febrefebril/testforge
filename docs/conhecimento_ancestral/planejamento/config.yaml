Plano do experimento de Shadow Mode
Schema YAML do experimento
1. Como estruturar o experimento de shadow mode?
1.1 Objetivo
Validar se o TestForge consegue sugerir curas corretas para falhas reais de locator sem introduzir falso healing.

O shadow mode deve responder:




Plain Text
Quando o teste quebra por locator:
  o TestForge sugeriu uma cura?
  a cura era correta?
  havia evidência suficiente?
  o oracle pós-ação confirmou a intenção?
  a taxonomia classificou corretamente a falha?
  a tecnologia da tela exigia tratamento especial?
1.2 Hipóteses do experimento
Defina hipóteses mensuráveis:




Plain Text
H1: O healing determinístico sugere curas corretas para falhas recuperáveis de locator.
H2: A taxa de falso healing fica abaixo de 2%.
H3: A precisão das sugestões fica acima de 95%.
H4: A LLM é acionada em menos de 10% dos casos.
H5: O custo adicional de execução fica abaixo de 20%.
A diferença para o plano anterior é que agora o sucesso é falsificável.

1.3 Escopo inicial
Eu começaria pequeno:




Plain Text
Aplicação:
  SIOPI ou aplicação piloto equivalente

Fluxos:
  5 a 10 fluxos reais

Massa:
  3 variações por fluxo

Perfis:
  pelo menos 2 perfis de usuário

Viewports:
  desktop padrão
  desktop alternativo

Volume mínimo:
  100 sugestões de healing revisadas antes de qualquer auto-heal

Mostrar mais linhas
Não tentaria validar em toda a suíte no início. O objetivo é ter qualidade de medição, não volume bruto.

1.4 Modos de execução
Use quatro modos.

Modo A — Baseline
Executa o teste atual.




Plain Text
sem MIS
sem ranking
sem fallback
sem healing
Serve para medir a dor atual.

Modo B — Candidate Mode
Executa o teste com:




Plain Text
MIS
ranking de locators
fallback conhecido
sem healing por reextração
Serve para medir se o simples fato de nascer com locators melhores já reduz falha.

Modo C — Shadow Mode
Quando falha:




Plain Text
gera candidatos de cura
calcula score
valida actionability
roda oracle em ambiente controlado
registra evidências
não aplica automaticamente
Esse é o modo principal do experimento.

Modo D — Auto-Heal Canary
Só depois do shadow mode aprovado.




Plain Text
auto-heal em poucos fluxos
baixo risco
rollback fácil
observabilidade completa
2. Pipeline prático do shadow mode
Quando um passo falha:




Plain Text
1. Capturar erro bruto.
2. Classificar pela taxonomia.
3. Verificar se é elegível para healing.
4. Reextrair DOM/accessibility tree.
5. Gerar novos candidatos.
6. Calcular:
   - score total
   - uniqueness
   - semantic gap
   - actionability
   - histórico
7. Validar candidato em modo shadow.
8. Executar oracle pós-ação, quando seguro.
9. Registrar evidence package.
10. Classificar:
    - true positive heal
    - false heal
    - not recoverable
    - inconclusive
11. Enviar para revisão humana se necessário.

Mostrar mais linhas
Importante: Playwright já possui auto-waiting, actionability checks e web-first assertions, então o TestForge deve usar esses mecanismos como parte da validação, em vez de criar esperas manuais frágeis.
