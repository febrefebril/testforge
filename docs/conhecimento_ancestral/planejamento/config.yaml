10. Compiler para Playwright
O compilador pega o melhor candidato e gera código.

Exemplo:




Python
class PlaywrightPythonCompiler:
    def compile_action(self, action: SemanticAction) -> str:
        locator = action.best_candidate().playwright

        if action.action == ActionType.CLICK:
            return f"await {locator}.click()"

        if action.action == ActionType.FILL:
            return f"await {locator}.fill({action.input_value!r})"

        raise NotImplementedError(action.action)
Para o caso:




YAML
action: click
target:
  role: button
  accessible_name: Pesquisar
Saída:




Python
await page.get_by_role("button", name="Pesquisar").click()
11. Como isso ajuda no self-healing
Quando o teste falhar, o runner não deve perguntar diretamente para a LLM:

“Qual seletor eu uso agora?”

Ele deve consultar o MIS:




Plain Text
Qual era a intenção?
Qual era o alvo semântico?
Quais eram os textos próximos?
Qual era o role?
Qual era o accessible name?
Quais candidatos existiam?
Qual era o score?
O DOM atual tem elemento parecido?
Aí o healing recalcula candidatos.

Fluxo:




Plain Text
1. Locator primário falhou.
2. Tentar candidatos alternativos do MIS.
3. Se todos falharem, reextrair DOM/acessibilidade.
4. Gerar novos candidatos.
5. Comparar com SemanticTarget original.
6. Calcular score.
7. Se score >= 0.90, auto-heal.
8. Se score entre 0.75 e 0.90, colocar em quarentena.
9. Se score < 0.75, acionar LLM/curadoria.
A LLM entra apenas quando a evidência determinística não for suficiente.

